<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CCA-F 模擬クイズ</title>
<style>

:root {
  --surface:#F5F6F9; --card:#FFFFFF; --ink:#1C2536; --sub:#5C6678; --line:#E3E6EE;
  --accent:#3B55C4; --accent-soft:#E7EBFA; --ok:#1E7F4F; --ok-soft:#E2F2E9;
  --ng:#C2403B; --ng-soft:#F9E7E6; --due:#B07C1F; --due-soft:#F7EEDC;
}
@media (prefers-color-scheme: dark) { :root {
  --surface:#12161F; --card:#1B2230; --ink:#E7EBF4; --sub:#98A2B6; --line:#2A3245;
  --accent:#5D74D8; --accent-soft:#232C4A; --ok:#3A9A6D; --ok-soft:#1B3128;
  --ng:#C95F5B; --ng-soft:#3A2323; --due:#A9843C; --due-soft:#332B18;
} }
:root[data-theme="light"] {
  --surface:#F5F6F9; --card:#FFFFFF; --ink:#1C2536; --sub:#5C6678; --line:#E3E6EE;
  --accent:#3B55C4; --accent-soft:#E7EBFA; --ok:#1E7F4F; --ok-soft:#E2F2E9;
  --ng:#C2403B; --ng-soft:#F9E7E6; --due:#B07C1F; --due-soft:#F7EEDC;
}
:root[data-theme="dark"] {
  --surface:#12161F; --card:#1B2230; --ink:#E7EBF4; --sub:#98A2B6; --line:#2A3245;
  --accent:#5D74D8; --accent-soft:#232C4A; --ok:#3A9A6D; --ok-soft:#1B3128;
  --ng:#C95F5B; --ng-soft:#3A2323; --due:#A9843C; --due-soft:#332B18;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--surface); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
  line-height:1.6; -webkit-font-smoothing:antialiased; }
.wrap { max-width:660px; margin:0 auto; padding:16px 16px 48px; display:flex; flex-direction:column; gap:14px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
.eyebrow { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--sub); font-weight:600; }
.chip { display:inline-block; font-size:12px; font-weight:600; padding:2px 10px; border-radius:999px;
  background:var(--accent-soft); color:var(--accent); }
button { font:inherit; cursor:pointer; }
button:focus-visible, a:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
@media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; } }
.num { font-variant-numeric:tabular-nums; }

.scenario { font-family:"Iowan Old Style",Georgia,"Hiragino Mincho ProN",serif; font-size:16.5px; }
.qtext { font-weight:650; margin:12px 0 4px; }
.choices { display:flex; flex-direction:column; gap:10px; }
.choice { display:flex; gap:10px; align-items:flex-start; text-align:left; width:100%;
  background:var(--card); border:1.5px solid var(--line); border-radius:10px; padding:12px 14px;
  color:var(--ink); transition:border-color .12s; }
.choice:not(:disabled):hover { border-color:var(--accent); }
.choice .key { font-weight:700; color:var(--accent); flex:0 0 auto; }
.choice.correct { border-color:var(--ok); background:var(--ok-soft); }
.choice.wrong { border-color:var(--ng); background:var(--ng-soft); }
.choice:disabled { cursor:default; opacity:.92; }
.verdict { font-weight:700; }
.verdict.ok { color:var(--ok); } .verdict.ng { color:var(--ng); }
.expl { border-left:3px solid var(--accent); padding:2px 0 2px 12px; margin-top:10px; font-size:14.5px; }
.expl a { color:var(--accent); word-break:break-all; font-size:13px; }
.next { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:13px; font-weight:700; width:100%; }
.progressbar { height:6px; background:var(--line); border-radius:999px; overflow:hidden; }
.progressbar > div { height:100%; background:var(--accent); border-radius:999px; transition:width .2s; }
.topline { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.score { font-size:40px; font-weight:750; }
.qr { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; background:var(--surface);
  border:1px dashed var(--line); border-radius:8px; padding:10px; word-break:break-all; user-select:all; }
.copybtn { background:var(--card); color:var(--accent); border:1.5px solid var(--accent);
  border-radius:10px; padding:11px; font-weight:700; width:100%; margin-top:8px; }
.reslist { display:flex; flex-direction:column; gap:6px; font-size:14px; }
.reslist .row { display:flex; gap:8px; align-items:baseline; }
.mark { font-weight:700; flex:0 0 1.2em; }
.hidden { display:none; }
.formbtn { display:block; text-align:center; text-decoration:none; background:var(--accent); color:#fff;
  border:none; border-radius:10px; padding:13px; font-weight:700; width:100%; margin-top:8px; }
.jabtn { background:var(--card); color:var(--sub); border:1.5px dashed var(--line);
  border-radius:10px; padding:10px; font-weight:700; width:100%; margin-top:12px; }
.jabtn:hover { border-color:var(--accent); color:var(--accent); }
.jabox { border-left:3px solid var(--sub); padding:2px 0 2px 12px; margin-top:10px; font-size:14.5px; color:var(--sub); }
.jabox .jaq { color:var(--ink); margin:0 0 8px; }
.jabox .jac { margin:2px 0; }
.jabox .jac b { color:var(--ink); }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div>
    <div class="topline">
      <span class="eyebrow" id="setlabel">CCA-F Practice · D4+D5 · 10問</span>
      <span class="eyebrow num" id="counter"></span>
    </div>
    <div class="progressbar" aria-hidden="true"><div id="pbar" style="width:0%"></div></div>
  </div>
  <div id="quiz" class="card">
    <span class="chip" id="domchip"></span>
    <p class="scenario" id="scenario"></p>
    <p class="qtext" id="question"></p>
    <div class="choices" id="choices"></div>
    <button class="jabtn" id="jabtn">日本語訳を表示</button>
    <div id="jabox" class="jabox hidden">
      <p class="jaq" id="jascenario"></p>
      <p class="jaq" id="jaquestion"></p>
      <div id="jachoices"></div>
    </div>
    <div id="feedback" class="hidden">
      <p class="verdict" id="verdict"></p>
      <div class="expl"><span id="expl"></span><br><a id="srclink" target="_blank" rel="noopener"></a></div>
      <button class="next" id="nextbtn" style="margin-top:14px">次の問題 →</button>
    </div>
  </div>
  <div id="final" class="card hidden">
    <span class="eyebrow">Result</span>
    <div class="score num" id="scoreline"></div>
    <div class="reslist" id="reslist"></div>
    <a id="formbtn" class="formbtn hidden" target="_blank" rel="noopener">📮 結果を送信して記録</a>
    <p style="margin:16px 0 6px; font-weight:650;">結果コード（手動記録用・コピーして Claude に貼り付け）</p>
    <div class="qr" id="qrcode"></div>
    <button class="copybtn" id="copybtn">結果コードをコピー</button>
  </div>
</div>
<script>
const QUESTIONS_DEFAULT = [{"id": "D4-q002", "statement_id": "D4-2", "scenario": "A classification prompt describes the desired output format in words ('Respond with the category name, a pipe, then a confidence from 0-100'), but Claude's outputs vary: sometimes prose, sometimes different separators.", "scenario_ja": "ある分類プロンプトは、望ましい出力形式を言葉で説明している（「カテゴリ名、パイプ記号、0〜100の信頼度で応答してください」）が、Claudeの出力はばらつく：あるときは散文で、あるときは異なる区切り文字を使う。", "question": "What is the most reliable prompt-level improvement?", "question_ja": "最も信頼できるプロンプトレベルの改善は何か？", "choices": {"A": "Add 3-5 few-shot examples showing exact input → output pairs in the desired format", "B": "Repeat the format description three times in the prompt", "C": "Raise max_tokens so Claude has room to comply", "D": "Add 'this is very important' before the format description"}, "choices_ja": {"A": "望ましい形式での正確な入力→出力のペアを示す3〜5個のfew-shot例を追加する", "B": "プロンプト内で形式の説明を3回繰り返す", "C": "Claudeが従うための余地を持てるようmax_tokensを上げる", "D": "形式の説明の前に「これは非常に重要です」を追加する"}, "answer": "A", "explanation_ja": "出力フォーマットのブレは few-shot（multishot）例示が最も効果的。具体例は言葉の説明より強く形式を規定する。B/D は限界がありスケールしない。C は無関係。（さらに確実性が必要なら構造化出力＝JSONスキーマの利用へ進む）", "source": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/multishot-prompting"}, {"id": "D4-q003", "statement_id": "D4-1", "scenario": "A financial-analysis prompt asks Claude for a final recommendation on a complex multi-factor decision. Answers are quick but frequently miss important considerations.", "scenario_ja": "ある財務分析プロンプトは、複雑な多要因の意思決定についてClaudeに最終的な推奨を求めている。回答は速いが、重要な考慮事項をしばしば見落としている。", "question": "Which technique most directly improves answer quality here?", "question_ja": "ここで回答の品質を最も直接的に改善する技法はどれか？", "choices": {"A": "Chain of thought: instruct Claude to reason through the factors step by step before giving the recommendation (or enable extended thinking)", "B": "Lower max_tokens to force more focused answers", "C": "Ask for the recommendation first, then the reasoning, so the answer is not biased", "D": "Split every factor into a separate unrelated conversation"}, "choices_ja": {"A": "Chain of thought：推奨を出す前に要因を段階的に推論するようClaudeに指示する（またはextended thinkingを有効にする）", "B": "より焦点を絞った回答を強制するためmax_tokensを下げる", "C": "答えが偏らないよう、まず推奨を求め、その後に理由付けを求める", "D": "すべての要因をそれぞれ無関係な別の会話に分割する"}, "answer": "A", "explanation_ja": "複雑な多要因の判断には Chain of Thought（段階的に考えさせてから結論）や extended thinking が有効。順序が重要で、推論→結論の順にする。C は逆（結論を先に出させると推論が後付けになる）。B は思考の余地を奪う。", "source": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/chain-of-thought"}, {"id": "D4-q004", "statement_id": "D4-3", "scenario": "A production pipeline parses Claude's JSON responses. About 2% of responses fail parsing due to markdown code fences, trailing commentary, or schema drift, and the team currently retries with modified prompts.", "scenario_ja": "ある本番パイプラインはClaudeのJSONレスポンスをパースしている。約2%のレスポンスが、Markdownのコードフェンス、末尾のコメント、スキーマのずれによりパースに失敗し、チームは現在プロンプトを修正してリトライしている。", "question": "What is the most robust solution?", "question_ja": "最も堅牢な解決策は何か？", "choices": {"A": "Add 'return ONLY valid JSON' in capital letters to the prompt", "B": "Use structured outputs: pass a JSON schema via output_config format so the API guarantees schema-valid output", "C": "Write a regex that strips everything before the first '{' and after the last '}'", "D": "Lower the temperature so outputs vary less"}, "choices_ja": {"A": "プロンプトに大文字で「有効なJSONのみを返してください」を追加する", "B": "構造化出力を使う：output_configのformatを介してJSONスキーマを渡し、APIがスキーマに準拠した出力を保証するようにする", "C": "最初の'{'より前とすべて最後の'}'より後を取り除く正規表現を書く", "D": "出力のばらつきを減らすためtemperatureを下げる"}, "answer": "B", "explanation_ja": "確実な JSON が必要なら構造化出力（output_config の format に json_schema を指定）が正解。API レベルでスキーマ準拠が保証される。A は改善するが保証がない、C は場当たり的で schema drift に無力、D は根本解決にならない（最新モデルではサンプリングパラメータ自体が使えない場合もある）。", "source": "https://platform.claude.com/docs/en/build-with-claude/structured-outputs"}, {"id": "D4-q005", "statement_id": "D4-3", "scenario": "A team needs to extract structured contact records from free-form emails. They want schema-validated fields AND they are on an API surface where they prefer defining the schema as part of tool use.", "scenario_ja": "あるチームは、自由形式のメールから構造化された連絡先レコードを抽出する必要がある。スキーマ検証されたフィールドが欲しく、かつツール利用の一部としてスキーマを定義することを好むAPIサーフェスを使っている。", "question": "Which approach implements tool-based JSON extraction?", "question_ja": "ツールベースのJSON抽出を実装するアプローチはどれか？", "choices": {"A": "Define a tool (e.g. record_contact) whose input_schema is the desired record schema, and force its use with tool_choice, then read the arguments from the tool_use block", "B": "Define a tool that returns the email text back to Claude for a second pass", "C": "Ask Claude to call an imaginary tool in plain text and parse the text", "D": "Use stop sequences to cut the response at the end of the JSON"}, "choices_ja": {"A": "望ましいレコードスキーマをinput_schemaとして持つツール（例：record_contact）を定義し、tool_choiceでその使用を強制し、tool_useブロックから引数を読む", "B": "2回目のパスのためにメール本文をClaudeに送り返すツールを定義する", "C": "Claudeにプレーンテキストで架空のツールを呼び出させ、そのテキストをパースする", "D": "JSONの終端でレスポンスを打ち切るためstop sequencesを使う"}, "answer": "A", "explanation_ja": "tool-based extraction は『抽出したいスキーマを input_schema に持つツールを定義し、tool_choice で強制、tool_use ブロックの input を読む』パターン。モデルはスキーマに従った引数を生成する。strict: true を付ければさらに厳密。C は擬似ツールで信頼性がない。D は構造保証にならない。", "source": "https://platform.claude.com/docs/en/agents-and-tools/tool-use/define-tools"}, {"id": "D4-q006", "statement_id": "D4-1", "scenario": "A legal-tech product needs Claude to consistently respond as a cautious legal analyst across thousands of API calls: same persona, same constraints, same output conventions.", "scenario_ja": "あるリーガルテック製品は、数千回のAPI呼び出しにわたって、Claudeが慎重な法務アナリストとして一貫して応答する必要がある：同じペルソナ、同じ制約、同じ出力の慣習を保つ。", "question": "Where should this persona definition live?", "question_ja": "このペルソナ定義はどこに置くべきか？", "choices": {"A": "In the system prompt (system parameter), defining the role, task framing, and constraints once for every request", "B": "Repeated at the start of every user message", "C": "In the first assistant message as a self-introduction", "D": "In tool descriptions, since they are read most carefully"}, "choices_ja": {"A": "システムプロンプト（systemパラメータ）に置き、すべてのリクエストに対して役割・タスクの枠組み・制約を一度だけ定義する", "B": "すべてのuserメッセージの冒頭で繰り返す", "C": "自己紹介として最初のassistantメッセージに置く", "D": "最も注意深く読まれるため、ツールの説明文に置く"}, "answer": "A", "explanation_ja": "役割（role）とタスクの枠組みは system プロンプトに置くのが基本。全リクエストに一貫して効き、キャッシュ効率も良い（安定した接頭辞）。B は冗長でキャッシュを乱し、C/D は本来の用途ではなく効果も不安定。", "source": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/system-prompts"}, {"id": "D4-q007", "statement_id": "D4-5", "scenario": "A company must classify 80,000 archived documents. There is no latency requirement — results are needed within a day — and cost matters.", "scenario_ja": "ある企業は8万件のアーカイブ文書を分類しなければならない。レイテンシ要件はなく（結果は1日以内に必要）、コストが重要である。", "question": "What is the most cost-effective approach?", "question_ja": "最もコスト効率の良いアプローチは何か？", "choices": {"A": "Send 80,000 sequential Messages API requests with a large model", "B": "Use the Message Batches API, which processes requests asynchronously at 50% of standard prices (most batches complete within an hour, max 24 hours)", "C": "Send all 80,000 documents in one giant request to save on per-request overhead", "D": "Use streaming to reduce token costs"}, "choices_ja": {"A": "大きなモデルを使って8万回の逐次的なMessages APIリクエストを送信する", "B": "標準価格の50%で非同期に処理されるMessage Batches APIを使う（ほとんどのバッチは1時間以内に完了、最大24時間）", "C": "リクエストごとのオーバーヘッドを節約するため、8万件の文書すべてを1つの巨大なリクエストで送る", "D": "トークンコストを減らすためストリーミングを使う"}, "answer": "B", "explanation_ja": "レイテンシ要件がない大量処理は Batch API 一択：全トークン50%引き、非同期で最大24時間以内に処理。1バッチ最大10万リクエスト。C は 1リクエストのコンテキスト上限を超えるし、そもそも安くならない。D のストリーミングは配信方式でありコストは変わらない。モデルの選択（Haiku等）も併用できる。", "source": "https://platform.claude.com/docs/en/build-with-claude/batch-processing"}, {"id": "D4-q008", "statement_id": "D4-6", "scenario": "A team asks the same Claude conversation that wrote a piece of code to review it for bugs. The review consistently reports 'no issues', yet bugs are later found in production.", "scenario_ja": "あるチームは、コードを書いたのと同じClaudeの会話に、バグがないかそのコードをレビューさせている。レビューは一貫して「問題なし」と報告するが、後になって本番環境でバグが見つかる。", "question": "What is the architectural lesson?", "question_ja": "アーキテクチャ上の教訓は何か？", "choices": {"A": "Claude cannot review code at all; only humans should review", "B": "Self-review within the same context is limited — the model is anchored by its own reasoning; use an independent instance with fresh context (and ideally a review-focused prompt) for critique", "C": "The review prompt needs the word 'CRITICAL' added", "D": "Reviews should run at a higher temperature for more creativity"}, "choices_ja": {"A": "Claudeはコードレビューをまったくできない。人間だけがレビューすべきである", "B": "同一コンテキスト内でのself-reviewには限界がある——モデルは自分自身の推論にアンカリングされてしまう。批評には新しいコンテキストを持つ独立したインスタンス（理想的にはレビューに特化したプロンプト）を使うべきである", "C": "レビュープロンプトに「CRITICAL」という単語を追加する必要がある", "D": "レビューはより創造性を発揮できるよう、より高いtemperatureで実行すべきである"}, "answer": "B", "explanation_ja": "同一コンテキストでの self-review は自分の推論・前提にアンカリングされ欠陥を見逃しやすい。独立したコンテキスト（別インスタンス・レビュー専用プロンプト）でのレビューが有効。信頼性設計の定石で、Claude Code のサブエージェントレビューも同じ発想。A は極端、C/D は本質でない。", "source": "https://platform.claude.com/docs/en/test-and-evaluate/strengthen-guardrails/increase-consistency"}, {"id": "D4-q009", "statement_id": "D4-4", "scenario": "An extraction pipeline validates output against a Pydantic schema. On failure, the current implementation simply resends the exact same request unchanged, hoping for a different result.", "scenario_ja": "ある抽出パイプラインは出力をPydanticスキーマに対して検証している。失敗した場合、現在の実装は単に元とまったく同じリクエストを変更せず再送し、異なる結果が出ることを期待している。", "question": "What change would make the retry loop actually effective, and when should retries be abandoned?", "question_ja": "リトライループを実際に効果的にする変更は何か。また、いつリトライを諦めるべきか？", "choices": {"A": "On retry, append the original document, the failed extraction, and the specific validation error to the prompt so the model can self-correct; abandon retries when the required information is simply absent from the source document rather than a format issue", "B": "Always retry exactly three times with the unchanged original prompt, regardless of the error type", "C": "Lower the temperature on every retry until the output validates", "D": "Switch to a larger model on the first failure without changing the prompt"}, "choices_ja": {"A": "リトライ時には、元の文書、失敗した抽出結果、そして具体的な検証エラーをプロンプトに追加し、モデルが自己修正できるようにする。必要な情報が単に元の文書に存在しない場合（形式の問題ではない場合）はリトライを諦める", "B": "エラーの種類に関わらず、変更しない元のプロンプトで常にちょうど3回リトライする", "C": "出力が検証を通るまで、リトライのたびにtemperatureを下げる", "D": "プロンプトを変更せず、最初の失敗でより大きなモデルに切り替える"}, "answer": "A", "explanation_ja": "有効なリトライは『具体的な検証エラーをプロンプトに追加して自己修正させる』こと。ただし情報がそもそも文書に存在しない場合（構造・書式の問題ではない）はリトライしても無意味なので見切りが必要。B は変更なしの盲目的リトライで効果が薄い。C/D は根本原因（欠落情報 vs 形式エラー）に対処していない。", "source": "materials/official/exam-guide.pdf (Task Statement 4.4)"}, {"id": "D5-q001", "statement_id": "D5-4", "scenario": "A developer sets \"model\": \"opus\" in ~/.claude/settings.json (user scope), but the project's .claude/settings.json sets \"model\": \"sonnet\". The developer also has .claude/settings.local.json with \"model\": \"haiku\".", "scenario_ja": "ある開発者は~/.claude/settings.json（ユーザースコープ）で\"model\": \"opus\"を設定しているが、プロジェクトの.claude/settings.jsonでは\"model\": \"sonnet\"が設定されている。この開発者はさらに.claude/settings.local.jsonで\"model\": \"haiku\"を設定している。", "question": "Which model applies in this project, and why?", "question_ja": "このプロジェクトではどのモデルが適用されるか、またその理由は？", "choices": {"A": "opus — user settings always win because they are the most personal", "B": "sonnet — project settings override local settings", "C": "haiku — local settings take precedence over shared project settings, which take precedence over user settings", "D": "The session fails to start because conflicting values are an error"}, "choices_ja": {"A": "opus——ユーザー設定は最も個人的なものであるため常に優先される", "B": "sonnet——プロジェクト設定はローカル設定より優先される", "C": "haiku——ローカル設定は共有プロジェクト設定より優先され、共有プロジェクト設定はユーザー設定より優先される", "D": "値が競合しているためエラーとなりセッションは開始できない"}, "answer": "C", "explanation_ja": "settings の優先順位は（managed を除くと）local > project > user。より具体的なスコープが勝つ。したがって settings.local.json の haiku が適用される。なお permission ルールは上書きではなく『マージ』される点も併せて押さえる。", "source": "https://code.claude.com/docs/en/settings"}, {"id": "D5-q002", "statement_id": "D5-1", "scenario": "A long-running agent conversation is approaching the model's context window limit, and the team must keep the session going without losing the thread of the work.", "scenario_ja": "長時間実行されているエージェントの会話がモデルのコンテキストウィンドウの上限に近づいており、チームは作業の流れを失うことなくセッションを継続しなければならない。", "question": "Which technique directly addresses this?", "question_ja": "この問題に直接対処する技法はどれか？", "choices": {"A": "Compaction: summarize earlier context (server-side compaction or harness-level summarization) so the conversation can continue within the window", "B": "Raise max_tokens, which increases the context window", "C": "Delete the system prompt to free space", "D": "Switch stop sequences to shorter strings"}, "choices_ja": {"A": "コンパクション：以前のコンテキストを要約する（サーバーサイドのcompaction、またはハーネスレベルの要約）ことで会話をウィンドウ内で継続できるようにする", "B": "コンテキストウィンドウを増やすmax_tokensを上げる", "C": "スペースを空けるためシステムプロンプトを削除する", "D": "stop sequencesをより短い文字列に切り替える"}, "answer": "A", "explanation_ja": "コンテキスト上限への対処はコンパクション（過去の履歴を要約に置き換える）。API のサーバーサイド compaction、または Claude Code の /compact のようなハーネス側要約がこれにあたる。max_tokens は『出力』の上限でありコンテキストウィンドウは増えない（B は頻出のひっかけ）。C は挙動を壊し、D は無関係。", "source": "https://platform.claude.com/docs/en/build-with-claude/context-windows"}];
const QUESTIONS_ALL = [{"id": "D1-q001", "statement_id": "D1-1", "scenario": "You are implementing an agentic loop with the Claude API. After sending a request with tools defined, you receive a response and need to decide what your code should do next.", "scenario_ja": "あなたはClaude APIでエージェンティックループを実装している。ツールを定義したリクエストを送信した後、レスポンスを受け取り、コードが次に何をすべきか判断する必要がある。", "question": "What is the correct way to determine whether Claude wants to execute a tool or has finished its response?", "question_ja": "Claudeがツールの実行を望んでいるのか、それとも応答を完了したのかを判定する正しい方法は何か？", "choices": {"A": "Check whether the response text contains phrases like 'I will now use the tool'", "B": "Check the stop_reason field: 'tool_use' means execute the requested tools, 'end_turn' means the loop is complete", "C": "Count the number of content blocks: more than one block means a tool call is pending", "D": "Always execute one more API call after each response to confirm Claude is done"}, "choices_ja": {"A": "レスポンステキストに「ツールを使用します」のようなフレーズが含まれているかを確認する", "B": "stop_reasonフィールドを確認する：「tool_use」ならリクエストされたツールを実行し、「end_turn」ならループは完了", "C": "コンテンツブロックの数を数える：1つより多ければツール呼び出しが保留中と判断する", "D": "各レスポンスの後に必ずもう1回APIを呼び出してClaudeが完了したか確認する"}, "answer": "B", "explanation_ja": "エージェンティックループの終了判定は stop_reason フィールドで行う。'tool_use' ならツールを実行して結果を返し、'end_turn' ならループ終了。A のような自然言語テキストの判定はアンチパターン（表現の揺れで壊れる）。C はコンテンツブロック数と tool 呼び出しは無関係。D は無駄なコストとレイテンシ。", "source": "https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works"}, {"id": "D1-q002", "statement_id": "D1-1", "scenario": "A developer builds an agent that processes support tickets. To prevent infinite loops, the agent stops after exactly 10 iterations, and this iteration cap is the only termination condition.", "scenario_ja": "ある開発者がサポートチケットを処理するエージェントを構築した。無限ループを防ぐため、エージェントはちょうど10回の反復で停止し、この反復回数の上限が唯一の終了条件になっている。", "question": "What is the main problem with this design?", "question_ja": "この設計の主な問題点は何か？", "choices": {"A": "Ten iterations is too few for any realistic agentic task", "B": "Iteration caps should be a safety backstop, not the primary stop condition; the loop should terminate primarily on stop_reason signals like end_turn", "C": "The agent should instead stop when its response text says the task is complete", "D": "Iteration caps are unnecessary because the API automatically prevents infinite loops"}, "choices_ja": {"A": "10回の反復はどんな現実的なエージェントタスクにとっても少なすぎる", "B": "反復回数の上限は主たる停止条件ではなく安全策のバックストップであるべきで、ループは主にend_turnのようなstop_reasonシグナルで終了すべきである", "C": "エージェントは代わりに、応答テキストがタスク完了を示したときに停止すべきである", "D": "APIが自動的に無限ループを防ぐため、反復回数の上限は不要である"}, "answer": "B", "explanation_ja": "反復回数上限を『主』停止条件にするのはアンチパターン。正常終了は stop_reason（end_turn）で判定し、上限はあくまで暴走防止のセーフティネットとして併用する。C はテキスト判定というもう一つのアンチパターン。D は誤り（API は自動でループを止めない）。", "source": "https://code.claude.com/docs/en/agent-sdk/agent-loop"}, {"id": "D1-q003", "statement_id": "D1-2", "scenario": "You are designing a research assistant that must gather information from five independent data sources, then combine the findings into a single report. The five lookups do not depend on each other.", "scenario_ja": "あなたは、5つの独立したデータソースから情報を集め、その結果を1つのレポートに統合しなければならないリサーチアシスタントを設計している。5つの検索は互いに依存していない。", "question": "Which multi-agent topology best fits this workload?", "question_ja": "このワークロードに最も適したマルチエージェントのトポロジーはどれか？", "choices": {"A": "Pipeline: each agent processes the output of the previous agent in sequence", "B": "Peer-to-peer: all five agents communicate freely with each other until consensus", "C": "Hub-and-spoke: an orchestrator dispatches the five independent lookups to worker agents in parallel and synthesizes the results", "D": "A single agent that performs all five lookups sequentially to keep the design simple"}, "choices_ja": {"A": "パイプライン：各エージェントが前のエージェントの出力を順番に処理する", "B": "ピアツーピア：5つのエージェントすべてが合意に達するまで自由に通信し合う", "C": "ハブアンドスポーク：オーケストレーターが5つの独立した検索をワーカーエージェントに並列で振り分け、結果を統合する", "D": "設計をシンプルに保つため、単一のエージェントが5つの検索をすべて順番に実行する"}, "answer": "C", "explanation_ja": "互いに依存しない並列タスク＋結果の統合、は典型的な hub-and-spoke（オーケストレーター＋ワーカー）。A のパイプラインは逐次依存がある変換処理向け。B は調整コストが高く、この単純な集約タスクには過剰。D は並列化の利点を捨てており遅い。", "source": "https://code.claude.com/docs/en/agent-sdk/subagents"}, {"id": "D1-q004", "statement_id": "D1-6", "scenario": "A document processing system must: (1) extract raw text from PDFs, (2) normalize and clean the text, (3) classify each document, and (4) generate a summary. Each stage consumes the previous stage's output.", "scenario_ja": "あるドキュメント処理システムは、(1) PDFから生テキストを抽出し、(2) テキストを正規化・クリーニングし、(3) 各ドキュメントを分類し、(4) 要約を生成する必要がある。各段階は前段階の出力を消費する。", "question": "Which topology is the most natural fit?", "question_ja": "最も自然に適合するトポロジーはどれか？", "choices": {"A": "Pipeline: agents arranged in sequence, each transforming the previous stage's output", "B": "Hub-and-spoke with all four stages running in parallel", "C": "Peer-to-peer so any stage can request rework from any other stage", "D": "A single monolithic prompt asking Claude to do all four steps at once"}, "choices_ja": {"A": "パイプライン：エージェントを順番に並べ、それぞれが前段階の出力を変換する", "B": "4つの段階すべてを並列で実行するハブアンドスポーク", "C": "任意の段階が他の任意の段階に手戻りを要求できるピアツーピア", "D": "Claudeに4つのステップすべてを一度に行わせる単一のモノリシックなプロンプト"}, "answer": "A", "explanation_ja": "各ステージが前段の出力に依存する逐次変換はパイプライン型。B は依存関係があるので並列化できない。C は不要な複雑さ。D はコンテキストが混ざり品質・デバッグ性が落ちる（タスク分解の利点を失う）。", "source": "https://code.claude.com/docs/en/agent-sdk/subagents"}, {"id": "D1-q005", "statement_id": "D1-3", "scenario": "An orchestrator agent delegates a code-search subtask to a subagent. The developer passes the orchestrator's entire conversation history (dozens of turns) to the subagent 'so it has full context'.", "scenario_ja": "オーケストレーターエージェントがコード検索のサブタスクをサブエージェントに委譲する。開発者は「サブエージェントが十分な文脈を持てるように」と、オーケストレーターの会話履歴全体（数十ターン分）をサブエージェントに渡している。", "question": "Why is this considered poor design?", "question_ja": "なぜこれは設計として良くないと考えられるのか？", "choices": {"A": "Subagents are technically unable to receive conversation history", "B": "It violates context isolation: the subagent should receive a focused task description, keeping its context clean and its results cheap to produce", "C": "The orchestrator's history must always be summarized by a third agent first", "D": "Passing history is fine; the only problem is increased network latency"}, "choices_ja": {"A": "サブエージェントは技術的に会話履歴を受け取ることができない", "B": "これはコンテキスト分離の原則に反する：サブエージェントは焦点を絞ったタスク記述を受け取るべきであり、それによってコンテキストをクリーンに保ち、結果を安価に生成できる", "C": "オーケストレーターの履歴は必ず先に別のエージェントによって要約されなければならない", "D": "履歴を渡すこと自体は問題なく、唯一の問題はネットワークレイテンシの増加である"}, "answer": "B", "explanation_ja": "サブエージェントの価値は『コンテキスト分離』にある。焦点を絞ったタスク記述だけを渡すことで、トークンコストを抑え、無関係な履歴による注意の分散を防ぐ。全履歴を渡すと分離の利点が消える。A は誤り（渡せてしまうのが問題）。C のような固定ルールはない。D はコストと品質の問題を無視している。", "source": "https://code.claude.com/docs/en/agent-sdk/subagents"}, {"id": "D1-q006", "statement_id": "D1-1", "scenario": "Your agent receives a response with stop_reason 'tool_use' containing two tool_use blocks. You execute both tools successfully.", "scenario_ja": "あなたのエージェントは、2つのtool_useブロックを含むstop_reasonが「tool_use」であるレスポンスを受け取った。あなたは両方のツールを正常に実行した。", "question": "How should the results be sent back to Claude?", "question_ja": "結果はどのようにClaudeに送り返すべきか？", "choices": {"A": "Send two separate user messages, one tool_result per message, in the order the tools were called", "B": "Append one user message containing both tool_result blocks, each carrying the matching tool_use_id", "C": "Append an assistant message containing the tool results as plain text", "D": "Start a new conversation containing only the tool results to keep context small"}, "choices_ja": {"A": "ツールが呼び出された順序で、1つのメッセージにつき1つのtool_resultを含む、2つの別々のuserメッセージを送る", "B": "対応するtool_use_idをそれぞれ持つ、両方のtool_resultブロックを含む1つのuserメッセージを追加する", "C": "ツール結果をプレーンテキストとして含むassistantメッセージを追加する", "D": "コンテキストを小さく保つため、ツール結果のみを含む新しい会話を開始する"}, "answer": "B", "explanation_ja": "並列ツール呼び出しの結果は『1つの user メッセージ』に全 tool_result ブロックをまとめて返す（各ブロックに対応する tool_use_id が必要）。A のように分割すると並列ツール利用が抑制される悪影響がある。C は role が誤り。D は会話履歴が失われる。", "source": "https://platform.claude.com/docs/en/agents-and-tools/tool-use/handle-tool-calls"}, {"id": "D1-q007", "statement_id": "D1-6", "scenario": "An agent must update 40 configuration files across a repository. Reviewing the task, you notice each file update is independent, but the team's current implementation processes them one at a time in a single agent conversation, which is slow and fills the context window.", "scenario_ja": "あるエージェントはリポジトリ全体で40個の設定ファイルを更新しなければならない。タスクを確認すると各ファイルの更新は独立しているが、チームの現在の実装は1つの会話の中で1つずつ順番に処理しており、遅い上にコンテキストウィンドウを埋めてしまっている。", "question": "What is the best architectural improvement?", "question_ja": "最良のアーキテクチャ上の改善は何か？", "choices": {"A": "Increase max_tokens so the single conversation can hold more file contents", "B": "Decompose the work and fan it out to parallel subagents, each handling a subset of files with its own context", "C": "Switch to a faster model so the sequential processing completes sooner", "D": "Ask the model to be more concise so the context window fills more slowly"}, "choices_ja": {"A": "単一の会話がより多くのファイル内容を保持できるようmax_tokensを増やす", "B": "作業をタスク分解し、各自のコンテキストを持つ複数のサブエージェントに並列で振り分ける", "C": "逐次処理がより早く完了するよう、より高速なモデルに切り替える", "D": "コンテキストウィンドウがより緩やかに埋まるよう、モデルに簡潔にするよう求める"}, "answer": "B", "explanation_ja": "独立したタスクの集合はタスク分解＋並列実行が定石。サブエージェントごとに独立したコンテキストを持たせることで、速度とコンテキスト圧迫の両方を解決できる。A/C/D はいずれも根本原因（逐次処理と単一コンテキスト）に対処していない。", "source": "https://code.claude.com/docs/en/agent-sdk/subagents"}, {"id": "D1-q008", "statement_id": "D1-1", "scenario": "A team wants to build a production coding agent. They are deciding between calling the Messages API directly with their own loop, or using the Claude Agent SDK.", "scenario_ja": "あるチームは本番用のコーディングエージェントを構築しようとしている。Messages APIを直接呼び出して自前のループを実装するか、Claude Agent SDKを使うかで検討している。", "question": "Which consideration most strongly favors the Claude Agent SDK?", "question_ja": "Claude Agent SDKを最も強く支持する検討事項はどれか？", "choices": {"A": "The Agent SDK is the only way to use tool calling with Claude", "B": "They want built-in agent-loop handling, session management, permissions, subagents, and file tools without reimplementing them", "C": "The Agent SDK is required for any request larger than 100K tokens", "D": "Direct API calls cannot be used in production environments"}, "choices_ja": {"A": "Agent SDKはClaudeでツール呼び出しを使う唯一の方法である", "B": "エージェントループ処理、セッション管理、パーミッション、サブエージェント、ファイルツールなどを再実装せずに組み込みで利用したい", "C": "Agent SDKは10万トークンを超えるあらゆるリクエストに必須である", "D": "直接のAPI呼び出しは本番環境では使用できない"}, "answer": "B", "explanation_ja": "Agent SDK は Claude Code と同じエージェントハーネス（ループ制御・セッション・permissions・サブエージェント・ファイル/bash ツール等）をライブラリとして提供する。自前ループの再実装を避けたい場合に最適。A/C/D は事実誤認（生API＋tool use でもエージェントは作れるし、本番利用も可能）。", "source": "https://code.claude.com/docs/en/agent-sdk/overview"}, {"id": "D1-q009", "statement_id": "D1-1", "scenario": "During testing, an agent occasionally responds with the text 'TASK COMPLETE' while stop_reason is still 'tool_use' because it also requested another tool call in the same response.", "scenario_ja": "テスト中、あるエージェントはstop_reasonがまだ「tool_use」であるにもかかわらず、テキストとして「TASK COMPLETE」と応答することがある。これは同じレスポンスの中で別のツール呼び出しも要求しているためである。", "question": "What should the loop implementation do in this case?", "question_ja": "この場合、ループの実装はどうすべきか？", "choices": {"A": "Terminate immediately because the model declared the task complete", "B": "Continue the loop: execute the requested tool and return its result, because stop_reason 'tool_use' means the turn is not finished", "C": "Ask the model to clarify whether it is really done", "D": "Terminate and log an error, since text and stop_reason must never disagree"}, "choices_ja": {"A": "モデルがタスク完了を宣言したので直ちに終了する", "B": "ループを継続する：要求されたツールを実行し結果を返す。なぜならstop_reasonが「tool_use」である限り、そのターンは終わっていないから", "C": "モデルに本当に完了したのか確認を求める", "D": "テキストとstop_reasonは決して食い違ってはならないため、終了してエラーをログに記録する"}, "answer": "B", "explanation_ja": "制御信号として信頼すべきは stop_reason。'tool_use' が返っている限りツール実行と結果返却を続ける。テキスト内容（'TASK COMPLETE'）で終了判定するのはアンチパターン。D のような不整合はエラーではなく、テキストは補足説明にすぎない。", "source": "https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works"}, {"id": "D1-q010", "statement_id": "D1-2", "scenario": "In a customer-support multi-agent system, the orchestrator itself performs refund calculations, drafts emails, queries the order database, and coordinates three subagents. The system is hard to debug and the orchestrator's context overflows frequently.", "scenario_ja": "あるカスタマーサポートのマルチエージェントシステムでは、オーケストレーター自身が返金計算、メール文面の作成、注文データベースへの問い合わせを行い、さらに3つのサブエージェントを調整している。このシステムはデバッグが難しく、オーケストレーターのコンテキストが頻繁にあふれる。", "question": "What design change best addresses the root cause?", "question_ja": "根本原因に最も適切に対処する設計変更は何か？", "choices": {"A": "Give the orchestrator a larger context window model", "B": "Restrict the orchestrator to decomposition, delegation, and synthesis; move execution work (calculations, drafting, queries) into specialized subagents", "C": "Merge the three subagents into the orchestrator to reduce coordination overhead", "D": "Add more logging to the orchestrator without changing responsibilities"}, "choices_ja": {"A": "オーケストレーターにより大きなコンテキストウィンドウを持つモデルを与える", "B": "オーケストレーターの役割を分解・委譲・統合に限定し、実行作業（計算・文面作成・問い合わせ）を専門のサブエージェントに移す", "C": "調整のオーバーヘッドを減らすため、3つのサブエージェントをオーケストレーターに統合する", "D": "責務を変えずにオーケストレーターへのログ記録を増やす"}, "answer": "B", "explanation_ja": "オーケストレーターの役割は『分解・委譲・統合』であり、実行作業を抱え込むと責務が混ざりコンテキストも溢れる。実行は専門サブエージェントへ。A は対症療法、C は逆方向（さらに肥大化）、D は根本原因に触れない。", "source": "https://code.claude.com/docs/en/agent-sdk/subagents"}, {"id": "D1-q011", "statement_id": "D1-5", "scenario": "A security team must guarantee that Claude Code never runs 'git push --force', even if a prompt or CLAUDE.md instruction suggests otherwise. A written rule in CLAUDE.md has proven unreliable.", "scenario_ja": "あるセキュリティチームは、たとえプロンプトやCLAUDE.mdの指示がそれを示唆していても、Claude Codeが決して「git push --force」を実行しないことを保証しなければならない。CLAUDE.mdに書かれたルールは信頼できないことが判明している。", "question": "What is the correct mechanism?", "question_ja": "正しいメカニズムは何か？", "choices": {"A": "Add a stronger, capitalized instruction in CLAUDE.md", "B": "Configure a PreToolUse hook (or a permission deny rule) that deterministically blocks the command before execution", "C": "Configure a PostToolUse hook to detect the command after it has run", "D": "Rely on the model's built-in safety training to refuse force pushes"}, "choices_ja": {"A": "CLAUDE.mdにより強い、大文字で書かれた指示を追加する", "B": "実行前にそのコマンドを決定的にブロックするPreToolUseフック（またはパーミッションのdenyルール）を設定する", "C": "コマンドが実行された後でそれを検知するPostToolUseフックを設定する", "D": "モデルの組み込みの安全性トレーニングがフォースプッシュを拒否することに頼る"}, "answer": "B", "explanation_ja": "確実な強制（enforcement）はプロンプトではなく決定的な仕組みで行う。実行『前』に介入できるのは PreToolUse フック（または permissions の deny ルール）。PostToolUse は実行後なので手遅れ。A/D は確率的で保証がない。『プロンプトは指針、フック/permissions は強制』という対比が問われる。", "source": "https://code.claude.com/docs/en/hooks"}, {"id": "D1-q012", "statement_id": "D1-7", "scenario": "You resumed a named session with --resume <session-name> to continue investigating a bug you were debugging yesterday. Since then, three of the files you had already analyzed were modified by a teammate.", "scenario_ja": "あなたは昨日デバッグしていたバグの調査を続けるため、--resume <session-name>で名前付きセッションを再開した。その後、あなたがすでに分析済みだった3つのファイルがチームメイトによって変更された。", "question": "What is the most reliable way to continue the investigation correctly?", "question_ja": "調査を正しく続ける最も確実な方法は何か？", "choices": {"A": "Resume as usual and trust the agent to notice the files changed on its own", "B": "Resume the session and explicitly inform the agent which specific files changed, so it re-analyzes only those rather than assuming its prior analysis still holds", "C": "Always start a brand-new session instead of resuming, regardless of how much prior context is still valid", "D": "Use fork_session instead of --resume, since forking always re-reads the filesystem"}, "choices_ja": {"A": "いつも通り再開し、エージェントがファイルの変更に自分で気づくことを信頼する", "B": "セッションを再開し、どのファイルが変更されたかを明示的にエージェントに伝え、以前の分析がまだ有効だと仮定せず、それらのファイルだけを再分析させる", "C": "どれだけ以前のコンテキストがまだ有効であっても、再開ではなく常に新しいセッションを開始する", "D": "fork_sessionは常にファイルシステムを再読み込みするため、--resumeの代わりにfork_sessionを使う"}, "answer": "B", "explanation_ja": "セッション再開後は、変更されたファイルを明示的に伝えて対象を絞った再分析をさせるのが確実（丸ごと再探索は不要）。A はエージェント任せで信頼性が低い。C は『再開が妥当な場合』の利点を捨てる過剰対応。D は fork_session の用途誤り（分岐探索用であり自動ファイル再読み込みの機能ではない）。", "source": "materials/official/exam-guide.pdf (Task Statement 1.7)"}, {"id": "D2-q001", "statement_id": "D2-4", "scenario": "You are explaining the MCP architecture to a colleague who is confused about why their AI application maintains three separate connections when it uses three MCP servers.", "scenario_ja": "あなたは、AIアプリケーションが3つのMCPサーバーを使うときに、なぜ3つの別々のコネクションを維持しているのか混乱している同僚にMCPアーキテクチャを説明している。", "question": "Which statement correctly describes the MCP architecture?", "question_ja": "MCPアーキテクチャを正しく説明しているのはどれか？", "choices": {"A": "The host application contains one MCP client per connected server; each client maintains a dedicated one-to-one connection with its server", "B": "A single MCP client multiplexes all servers over one shared connection", "C": "MCP servers connect directly to each other and elect a leader that talks to the host", "D": "The model itself opens TCP connections to each server at inference time"}, "choices_ja": {"A": "ホストアプリケーションは接続するサーバーごとに1つのMCPクライアントを持ち、各クライアントはそのサーバーと専用の1対1接続を維持する", "B": "単一のMCPクライアントが、1つの共有接続上ですべてのサーバーを多重化する", "C": "MCPサーバー同士が直接接続し、ホストと話すリーダーを選出する", "D": "モデル自身が推論時に各サーバーへTCP接続を開く"}, "answer": "A", "explanation_ja": "MCP はホスト（AIアプリ）・クライアント・サーバの3層で、ホストはサーバごとに専用のクライアントを1つ持つ（1対1接続）。B の多重化モデルではない。C/D はアーキテクチャの誤解。ホスト＝Claude Desktop や Claude Code、サーバ＝機能提供側、という対応も押さえる。", "source": "https://modelcontextprotocol.io/docs/learn/architecture"}, {"id": "D2-q002", "statement_id": "D2-1", "scenario": "An MCP server for a project-management SaaS will expose: (1) an action that creates a new task, (2) read-only project data the application may include as context, and (3) a reusable, user-selectable template for weekly report generation.", "scenario_ja": "あるプロジェクト管理SaaS用のMCPサーバーは、(1) 新しいタスクを作成するアクション、(2) アプリケーションが文脈として含めることのある読み取り専用のプロジェクトデータ、(3) 週次レポート生成用の再利用可能でユーザーが選択できるテンプレート、を公開する予定である。", "question": "Which MCP primitive should implement each capability?", "question_ja": "それぞれの機能はどのMCPプリミティブで実装すべきか？", "choices": {"A": "(1) Tool, (2) Resource, (3) Prompt", "B": "(1) Resource, (2) Tool, (3) Prompt", "C": "(1) Tool, (2) Prompt, (3) Resource", "D": "(1) Prompt, (2) Resource, (3) Tool"}, "choices_ja": {"A": "(1) Tool, (2) Resource, (3) Prompt", "B": "(1) Resource, (2) Tool, (3) Prompt", "C": "(1) Tool, (2) Prompt, (3) Resource", "D": "(1) Prompt, (2) Resource, (3) Tool"}, "answer": "A", "explanation_ja": "Tools＝モデルが呼び出す実行可能なアクション（副作用あり得る）、Resources＝アプリケーションが文脈として供給する読み取り専用データ、Prompts＝ユーザーが明示的に選ぶ再利用可能なテンプレート。誰がコントロールするか（model / application / user）で区別するのが最短の覚え方。", "source": "https://modelcontextprotocol.io/docs/learn/server-concepts"}, {"id": "D2-q003", "statement_id": "D2-4", "scenario": "A team builds two MCP servers: one wraps a local CLI tool and will run on each developer's machine, spawned by the host; the other is a shared company-wide service that many remote users must reach over the network.", "scenario_ja": "あるチームが2つのMCPサーバーを構築している。1つはローカルのCLIツールをラップし各開発者のマシン上でホストによって起動される。もう1つは多数のリモートユーザーがネットワーク越しにアクセスしなければならない、全社共有のサービスである。", "question": "Which transports should each server use?", "question_ja": "それぞれのサーバーはどのトランスポートを使うべきか？", "choices": {"A": "Both must use stdio, since it is the only officially supported transport", "B": "The local one uses stdio (spawned as a subprocess); the shared remote one uses the HTTP-based transport (Streamable HTTP)", "C": "The local one uses HTTP on localhost; the remote one uses stdio over SSH", "D": "Both should use WebSockets for bidirectional communication"}, "choices_ja": {"A": "唯一公式にサポートされているトランスポートであるため、両方ともstdioを使うべきである", "B": "ローカルのものはstdio（サブプロセスとして起動）を使い、共有のリモートのものはHTTPベースのトランスポート（Streamable HTTP）を使う", "C": "ローカルのものはlocalhost上でHTTPを使い、リモートのものはSSH経由のstdioを使う", "D": "双方向通信のため、両方ともWebSocketsを使うべきである"}, "answer": "B", "explanation_ja": "ローカルでホストが子プロセスとして起動する形態は stdio、ネットワーク越しの共有サービスは Streamable HTTP（HTTP POST + オプションで SSE ストリーミング）。旧 HTTP+SSE トランスポートは Streamable HTTP に置き換えられた経緯も押さえておく。C の『stdio over SSH』や D の WebSocket は仕様の標準トランスポートではない。", "source": "https://modelcontextprotocol.io/specification/2025-11-25/basic/transports"}, {"id": "D2-q004", "statement_id": "D2-1", "scenario": "An MCP server exposes a single tool called 'do_database_operation' that accepts a raw SQL string and an operation type. Model behavior is erratic: wrong tables, occasional destructive queries, and poor tool selection.", "scenario_ja": "あるMCPサーバーは、生のSQL文字列と操作種別を受け取る「do_database_operation」という単一のツールを公開している。モデルの挙動は不安定で、誤ったテーブルへのアクセス、時折の破壊的クエリ、ツール選択の悪さが見られる。", "question": "What is the best redesign of the tool boundary?", "question_ja": "ツール境界の最良の再設計はどれか？", "choices": {"A": "Keep the single tool but write a longer description warning the model to be careful", "B": "Split it into focused, well-named tools (e.g. search_customers, get_order, update_order_status) with typed input schemas and clear descriptions of when to use each", "C": "Remove the description entirely so the model relies on the tool name", "D": "Expose the database connection string as a Resource so the model can connect directly"}, "choices_ja": {"A": "単一のツールは維持しつつ、モデルに注意を促すより長い説明文を書く", "B": "型付き入力スキーマと、それぞれをいつ使うかの明確な説明を持つ、焦点の絞られた適切な名前のツール（例：search_customers、get_order、update_order_status）に分割する", "C": "モデルがツール名に頼るよう、説明文を完全に削除する", "D": "モデルが直接接続できるよう、データベース接続文字列をResourceとして公開する"}, "answer": "B", "explanation_ja": "ツール境界設計の基本：粒度は『1ツール=1つの明確な意図』、良い命名、型付き入力スキーマ、いつ使うかを書いた説明。生SQLを受ける万能ツールは誤用・破壊的操作のリスクが高い。A は根本対策でない。D は接続情報の漏洩でセキュリティ違反。", "source": "https://modelcontextprotocol.io/docs/develop/build-server"}, {"id": "D2-q005", "statement_id": "D2-1", "scenario": "A company deploys an MCP server that can send emails on behalf of the user. The security review asks how the system prevents the model from silently sending emails without the user's knowledge.", "scenario_ja": "ある企業はユーザーに代わってメールを送信できるMCPサーバーをデプロイしている。セキュリティレビューでは、ユーザーの知らないうちにモデルが黙ってメールを送信することをシステムがどう防いでいるか尋ねている。", "question": "According to MCP security principles, what is required?", "question_ja": "MCPのセキュリティ原則によれば、何が必要とされるか？", "choices": {"A": "Nothing: once the server is installed, tool calls are implicitly authorized", "B": "The host must obtain explicit user consent before invoking tools, especially those with side effects; users should understand and authorize what each tool does", "C": "The server should log emails after sending so users can audit later", "D": "The model should be prompted to always ask itself whether sending is appropriate"}, "choices_ja": {"A": "何もない：サーバーがインストールされた時点で、ツール呼び出しは暗黙的に承認されている", "B": "ホストはツール、特に副作用のあるツールを呼び出す前に明示的なユーザーの同意を得なければならない。ユーザーは各ツールが何をするかを理解し、承認すべきである", "C": "サーバーは後で監査できるよう、送信後にメールをログに記録すべきである", "D": "モデルは送信が適切かどうか自問するよう常にプロンプトされるべきである"}, "answer": "B", "explanation_ja": "MCP 仕様のセキュリティ原則の中核は『ユーザーの明示的な同意とコントロール』。特に副作用のあるツール実行はホストがユーザー同意を得てから行う。C の事後ログは同意の代替にならない。D はプロンプト任せで保証がない。", "source": "https://modelcontextprotocol.io/specification/2025-11-25/index"}, {"id": "D2-q006", "statement_id": "D2-1", "scenario": "A developer wants the model to be able to fetch the current content of specific documentation pages so it can answer questions. The pages are read-only and identified by URIs. They implemented this as a Tool, but a reviewer suggests Resources.", "scenario_ja": "ある開発者は、モデルが質問に答えられるよう特定のドキュメントページの現在の内容を取得できるようにしたいと考えている。ページは読み取り専用でURIによって識別される。開発者はこれをToolとして実装したが、レビュアーはResourcesを提案している。", "question": "What is the key architectural argument for using Resources here?", "question_ja": "ここでResourcesを使うことの重要なアーキテクチャ上の論拠は何か？", "choices": {"A": "Resources are faster than Tools because they bypass the JSON-RPC layer", "B": "Resources are application-controlled read-only data identified by URIs — the host decides how to expose them as context, which matches read-only reference data better than a model-invoked action", "C": "Tools cannot return text content, only numbers", "D": "Resources automatically update the model's training data"}, "choices_ja": {"A": "ResourcesはJSON-RPC層を迂回するためToolsより高速である", "B": "ResourcesはURIによって識別されるアプリケーション制御の読み取り専用データであり、ホストがそれをどうコンテキストとして公開するかを決める——これはモデルが起動するアクションよりも読み取り専用の参照データに適している", "C": "Toolsはテキストコンテンツを返せず、数値しか返せない", "D": "Resourcesは自動的にモデルの学習データを更新する"}, "answer": "B", "explanation_ja": "URIで識別される読み取り専用データは Resource の設計対象。Resource はアプリケーション制御で、ホスト側が文脈への取り込み方を決められる。Tool は副作用を伴い得る『モデルが起こすアクション』向け。A/C/D は事実誤認。ただし実務ではクライアントの Resource 対応状況によって Tool 化する判断もあり、試験では『原則』を問われる。", "source": "https://modelcontextprotocol.io/docs/learn/server-concepts"}, {"id": "D2-q007", "statement_id": "D2-4", "scenario": "An MCP client connects to a server and must agree on the protocol rules before any tools are listed or called.", "scenario_ja": "あるMCPクライアントはサーバーに接続し、ツールが一覧表示されたり呼び出されたりする前に、プロトコルのルールについて合意しなければならない。", "question": "What happens during the MCP initialization phase?", "question_ja": "MCPの初期化フェーズでは何が起こるか？", "choices": {"A": "The client and server exchange initialize messages to negotiate the protocol version and declare their capabilities before normal operations begin", "B": "The server immediately streams its full tool list; version checks are optional", "C": "The client downloads the server's source code to verify compatibility", "D": "Authentication tokens are exchanged; protocol versions are resolved lazily on first tool call"}, "choices_ja": {"A": "クライアントとサーバーはinitializeメッセージを交換し、通常運用が始まる前にプロトコルバージョンを交渉しcapabilityを宣言し合う", "B": "サーバーは直ちに完全なツールリストをストリーム配信する。バージョンチェックは任意である", "C": "クライアントは互換性を確認するためサーバーのソースコードをダウンロードする", "D": "認証トークンが交換される。プロトコルバージョンは最初のツール呼び出し時に遅延解決される"}, "answer": "A", "explanation_ja": "MCP のライフサイクルは initialize（プロトコルバージョン交渉＋capability 宣言）→ initialized 通知 → 通常運用、の順。capability negotiation により双方がサポートする機能（tools, resources, prompts, sampling 等）を宣言し合う。B/D のような遅延解決ではない。", "source": "https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle"}, {"id": "D2-q008", "statement_id": "D2-4", "scenario": "A remote MCP server requires authorization. The team plans to implement it by putting a static API key in the URL query string for every user.", "scenario_ja": "あるリモートMCPサーバーは認可を必要とする。チームは、すべてのユーザーに対して静的なAPIキーをURLのクエリ文字列に入れることでこれを実装しようと計画している。", "question": "What does the MCP authorization specification recommend instead for HTTP-based transports?", "question_ja": "HTTPベースのトランスポートに対して、MCPの認可仕様は代わりに何を推奨しているか？", "choices": {"A": "OAuth 2.1-based authorization flows, where the client obtains scoped access tokens rather than embedding static shared credentials", "B": "Basic authentication with a company-wide shared password", "C": "Client IP allowlisting as the sole control", "D": "No authorization: MCP traffic should always be anonymous"}, "choices_ja": {"A": "静的な共有クレデンシャルを埋め込むのではなく、クライアントがスコープ付きアクセストークンを取得するOAuth 2.1ベースの認可フロー", "B": "会社全体で共有された1つのパスワードによるBasic認証", "C": "唯一の制御としてのクライアントIPアローリスト", "D": "認可なし：MCPトラフィックは常に匿名であるべきである"}, "answer": "A", "explanation_ja": "HTTPベースのトランスポートに対する MCP の authorization 仕様は OAuth 2.1 ベース。ユーザーごとにスコープ付きトークンを取得し、静的な共有クレデンシャルを避ける。クエリ文字列のAPIキーはログ漏洩リスクも高い。B/C は近代的な認可の代替にならず、D は論外。", "source": "https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization"}, {"id": "D2-q009", "statement_id": "D2-2", "scenario": "An MCP tool wraps a flaky third-party API. When it fails, your implementation currently returns the generic string \"Operation failed\" regardless of cause, and the agent cannot decide whether to retry, try something else, or explain the failure to the user.", "scenario_ja": "あるMCPツールは不安定なサードパーティAPIをラップしている。それが失敗すると、現在の実装は原因に関わらず一般的な文字列「Operation failed」を返し、エージェントはリトライすべきか、他の方法を試すべきか、それともユーザーに失敗を説明すべきか判断できない。", "question": "What is the correct way to fix this using the MCP error pattern?", "question_ja": "MCPのエラーパターンを使ってこれを正しく修正する方法は何か？", "choices": {"A": "Return structured error metadata via the isError flag, including an errorCategory (transient/validation/business/permission) and an isRetryable boolean, plus a human-readable description", "B": "Keep the generic message but log the real cause server-side for engineers to review later", "C": "Silently retry three times internally and only surface an error if all three attempts fail, without any category information", "D": "Throw a raw exception so the MCP client crashes and the developer notices immediately"}, "choices_ja": {"A": "isErrorフラグを介して構造化されたエラーメタデータを返す。errorCategory（一時的/検証/ビジネス/権限）とisRetryableブール値、そして人間が読める説明を含める", "B": "一般的なメッセージは維持しつつ、エンジニアが後で確認できるようサーバー側で実際の原因をログに記録する", "C": "内部で3回サイレントにリトライし、3回すべて失敗した場合のみ、カテゴリ情報なしでエラーを表面化させる", "D": "開発者がすぐに気づけるよう、生の例外をスローしてMCPクライアントをクラッシュさせる"}, "answer": "A", "explanation_ja": "MCPの isError パターンでは、errorCategory（一時的/検証/ビジネス/権限）と isRetryable のような構造化メタデータを返すことで、エージェントが適切な回復判断（リトライ・代替手段・ユーザーへの説明）を下せるようになる。画一的な文言（B/C）は判断材料を隠す。D はクラッシュを招き復旧の機会を奪う。", "source": "materials/official/exam-guide.pdf (Task Statement 2.2)"}, {"id": "D2-q010", "statement_id": "D2-5", "scenario": "You need to find every place in a large codebase that calls a function named processPayment, including calls that go through re-exported wrapper modules with different names.", "scenario_ja": "あなたは、異なる名前で再エクスポートされたラッパーモジュールを経由する呼び出しも含め、大規模なコードベース内でprocessPaymentという名前の関数を呼び出しているすべての箇所を見つける必要がある。", "question": "What is the most effective built-in tool workflow for this investigation?", "question_ja": "この調査に最も効果的な組み込みツールのワークフローは何か？", "choices": {"A": "Use Grep to find the function definition and all direct call sites, then identify exported wrapper names and Grep again for each of those names across the codebase", "B": "Use Glob with pattern **/*.ts to list every TypeScript file, then Read each one in full to check for the function name", "C": "Use Edit to insert a logging statement into every file, then run the test suite and check which logs fire", "D": "Use Write to create a single file listing all known call sites from memory, without searching the codebase"}, "choices_ja": {"A": "Grepを使って関数定義と直接の呼び出し箇所をすべて見つけ、エクスポートされたラッパー名を特定し、それらの名前それぞれについてコードベース全体を再度Grepする", "B": "Globでパターン**/*.tsを使ってすべてのTypeScriptファイルを列挙し、それぞれをReadで全文読んで関数名を確認する", "C": "Editを使ってすべてのファイルにログ出力文を挿入し、テストスイートを実行してどのログが発火するか確認する", "D": "コードベースを検索せず、記憶にある既知の呼び出し箇所をすべて列挙した単一のファイルをWriteで作成する"}, "answer": "A", "explanation_ja": "Grep はファイル内容の検索（関数名・エラーメッセージ等）に適しており、まずエクスポート名を特定し、それぞれの名前で再検索することでラッパー経由の呼び出しも追跡できる。Glob（B）はパスパターン一致であり内容検索には向かず、全文Readは非効率。C はこのタスクの目的（静的な呼び出し箇所の調査）に対して過剰かつ的外れ。D は検索を行っておらず不正確。", "source": "materials/official/exam-guide.pdf (Task Statement 2.5)"}, {"id": "D3-q001", "statement_id": "D3-1", "scenario": "A developer wants coding conventions shared with the whole team via version control, but also keeps personal sandbox URLs that should never be committed to the repository.", "scenario_ja": "ある開発者は、コーディング規約をバージョン管理を通じてチーム全体と共有したい一方で、リポジトリに決してコミットすべきでない個人用のサンドボックスURLも保持している。", "question": "Where should each piece of memory live?", "question_ja": "それぞれのメモリはどこに置くべきか？", "choices": {"A": "Team conventions in ./CLAUDE.md (checked into the repo); personal, uncommitted notes in CLAUDE.local.md or ~/.claude/CLAUDE.md", "B": "Everything in ~/.claude/CLAUDE.md so it applies to all projects", "C": "Everything in ./CLAUDE.md, with personal notes marked by comments so teammates ignore them", "D": "Team conventions in CLAUDE.local.md; personal notes in ./CLAUDE.md"}, "choices_ja": {"A": "チームの規約はリポジトリにコミットされる./CLAUDE.mdに、個人的でコミットしないメモはCLAUDE.local.mdまたは~/.claude/CLAUDE.mdに置く", "B": "すべてのプロジェクトに適用されるよう、すべてを~/.claude/CLAUDE.mdに置く", "C": "すべてを./CLAUDE.mdに置き、チームメイトが無視できるようコメントで個人的なメモに印を付ける", "D": "チームの規約をCLAUDE.local.mdに、個人的なメモを./CLAUDE.mdに置く"}, "answer": "A", "explanation_ja": "CLAUDE.md には階層がある。プロジェクト共有の規約はリポジトリにコミットする ./CLAUDE.md、個人的で共有しないものは CLAUDE.local.md（gitignore 対象）またはユーザースコープの ~/.claude/CLAUDE.md。B は全プロジェクトに漏れる、C は機密がコミットされる、D は役割が逆。", "source": "https://code.claude.com/docs/en/memory"}, {"id": "D3-q002", "statement_id": "D3-2", "scenario": "A team builds an Agent Skill for generating financial reports. The SKILL.md file has grown to 8,000 lines including full API references, examples, and edge-case tables, and Claude's performance has degraded.", "scenario_ja": "あるチームが財務レポート生成用のAgent Skillを構築している。SKILL.mdファイルは完全なAPIリファレンス、例、エッジケースの表を含めて8,000行にまで膨れ上がり、Claudeのパフォーマンスが低下している。", "question": "How should the skill be restructured according to progressive disclosure principles?", "question_ja": "progressive disclosure（段階的開示）の原則に従うと、このskillはどう再構成すべきか？", "choices": {"A": "Split the content into multiple skills with identical descriptions so Claude picks one at random", "B": "Keep a concise SKILL.md with the core workflow, and move detailed references into separate files in the skill folder that Claude reads only when needed", "C": "Move all content into the system prompt so it is always available", "D": "Compress the text by removing whitespace and abbreviating words"}, "choices_ja": {"A": "Claudeがランダムに1つを選ぶよう、同一の説明文を持つ複数のskillにコンテンツを分割する", "B": "コアとなるワークフローを含む簡潔なSKILL.mdを維持し、詳細な参考資料はskillフォルダ内の別ファイルに移して、必要なときだけClaudeが読み込むようにする", "C": "常に利用可能であるよう、すべてのコンテンツをシステムプロンプトに移す", "D": "空白を削除し単語を省略してテキストを圧縮する"}, "answer": "B", "explanation_ja": "Skills の設計原則は progressive disclosure：常時読み込まれるのは skill の説明（と本体は必要になったとき）で、詳細資料は skill フォルダ内の別ファイルに分け、必要なときだけ Claude が参照する。C はコンテキストを常時圧迫し逆効果。A/D は問題を解決しない。", "source": "https://code.claude.com/docs/en/skills"}, {"id": "D3-q003", "statement_id": "D3-2", "scenario": "A team has three needs: (1) a frequently typed shortcut that expands to a fixed review-checklist prompt, (2) domain expertise Claude should apply automatically whenever it works on billing code, and (3) an isolated read-only investigator for large log searches that should not pollute the main context.", "scenario_ja": "あるチームには3つのニーズがある：(1) 固定のレビューチェックリストのプロンプトに展開される、頻繁に入力されるショートカット、(2) 請求関連のコードを扱うときにClaudeが常に自動的に適用すべき専門知識、(3) 大規模なログ検索のための、メインのコンテキストを汚染すべきでない独立した読み取り専用の調査役。", "question": "Which mapping of features to needs is correct?", "question_ja": "機能とニーズの対応付けとして正しいのはどれか？", "choices": {"A": "(1) subagent, (2) slash command, (3) skill", "B": "(1) slash command, (2) skill, (3) subagent", "C": "(1) skill, (2) subagent, (3) slash command", "D": "(1) slash command, (2) subagent, (3) skill"}, "choices_ja": {"A": "(1) subagent, (2) slash command, (3) skill", "B": "(1) slash command, (2) skill, (3) subagent", "C": "(1) skill, (2) subagent, (3) slash command", "D": "(1) slash command, (2) subagent, (3) skill"}, "answer": "B", "explanation_ja": "ユーザーが明示的に打つ定型プロンプトはスラッシュコマンド。条件に合致したとき Claude が自律的に読み込む専門知識は skill。独立コンテキストで動く探索・調査ワーカーはサブエージェント。この3つの使い分けは頻出ポイント。", "source": "https://code.claude.com/docs/en/skills"}, {"id": "D3-q004", "statement_id": "D3-1", "scenario": "A team wants to automatically run a code formatter on every file that Claude Code edits, immediately after each edit succeeds.", "scenario_ja": "あるチームは、Claude Codeが編集したすべてのファイルに対して、各編集が成功した直後に自動的にコードフォーマッタを実行したいと考えている。", "question": "Which hook event should they use?", "question_ja": "どのフックイベントを使うべきか？", "choices": {"A": "PreToolUse matched on the Edit tool", "B": "PostToolUse matched on the Edit tool", "C": "UserPromptSubmit", "D": "SessionStart"}, "choices_ja": {"A": "EditツールにマッチさせたPreToolUse", "B": "EditツールにマッチさせたPostToolUse", "C": "UserPromptSubmit", "D": "SessionStart"}, "answer": "B", "explanation_ja": "編集が『成功した後』に走らせる処理は PostToolUse（matcher で Edit/Write 系ツールに絞る）。PreToolUse は実行前の検証・ブロック用。UserPromptSubmit はプロンプト送信時、SessionStart はセッション開始時で用途が異なる。イベントごとの発火タイミングの理解が問われる。", "source": "https://code.claude.com/docs/en/hooks"}, {"id": "D3-q005", "statement_id": "D3-6", "scenario": "During a long refactoring session, a developer asks Claude Code to also investigate a flaky test. The investigation involves reading dozens of log files, and the developer worries this will crowd out the refactoring context.", "scenario_ja": "長時間のリファクタリングセッション中に、開発者はClaude Codeに不安定なテストの調査も依頼した。その調査は数十個のログファイルを読むことを伴い、開発者はこれがリファクタリングのコンテキストを圧迫するのではないかと心配している。", "question": "What is the best way to handle the investigation?", "question_ja": "この調査を扱う最良の方法は何か？", "choices": {"A": "Run the investigation in the same conversation and use /compact afterwards", "B": "Delegate the investigation to a subagent, which works in its own context window and returns only its findings", "C": "Paste all log files into CLAUDE.md so they persist", "D": "Disable the Read tool so logs cannot enter the context"}, "choices_ja": {"A": "同じ会話の中で調査を実行し、その後/compactを使う", "B": "調査をサブエージェントに委譲する。サブエージェントは自身のコンテキストウィンドウの中で作業し、結果のみを返す", "C": "すべてのログファイルをCLAUDE.mdに貼り付けて永続化する", "D": "ログがコンテキストに入らないようReadツールを無効化する"}, "answer": "B", "explanation_ja": "サブエージェントは独立したコンテキストウィンドウを持ち、大量のファイル読み込みを本体の会話から分離できる。返ってくるのは要約された結論のみ。A は一度汚れたコンテキストの対症療法。C は CLAUDE.md の誤用。D は投機的で作業自体を不可能にする。", "source": "https://code.claude.com/docs/en/sub-agents"}, {"id": "D3-q006", "statement_id": "D3-6", "scenario": "A team wants their CI pipeline to automatically triage new GitHub issues using Claude Code: no interactive terminal, a single prompt in, structured result out.", "scenario_ja": "あるチームは、対話的なターミナルなしで、単一のプロンプトを入力すると構造化された結果が出力される形で、CIパイプラインがClaude Codeを使って新しいGitHub issueを自動的にトリアージできるようにしたいと考えている。", "question": "Which invocation pattern fits this requirement?", "question_ja": "この要件に適合する呼び出しパターンはどれか？", "choices": {"A": "Run 'claude' interactively on the CI runner and type the prompt manually", "B": "Use headless mode: 'claude -p \"<prompt>\"' with an output format suitable for scripting, or the Claude Code GitHub Action", "C": "Headless usage is not supported; CI must call the raw Messages API without Claude Code", "D": "Enable a SessionStart hook that reads the issue from an environment variable"}, "choices_ja": {"A": "CIランナー上で'claude'を対話的に実行し、プロンプトを手動で入力する", "B": "ヘッドレスモードを使う：スクリプト向きの出力フォーマットを伴う'claude -p \"<prompt>\"'、あるいはClaude Code GitHub Actionを使う", "C": "ヘッドレス利用はサポートされていない。CIはClaude Codeを使わず生のMessages APIを呼び出す必要がある", "D": "環境変数からissueを読み込むSessionStartフックを有効にする"}, "answer": "B", "explanation_ja": "CI/CD などの非対話環境では headless モード（claude -p、--output-format json 等）や GitHub Actions 統合を使う。A は非対話環境で成立しない。C は誤り（headless は公式サポート）。D はフックの用途違い。", "source": "https://code.claude.com/docs/en/headless"}, {"id": "D3-q007", "statement_id": "D3-5", "scenario": "A developer asks Claude Code to \"reformat this CSV export into the format our billing system expects.\" The prose description alone produces inconsistent transformations across different runs.", "scenario_ja": "ある開発者はClaude Codeに「このCSVエクスポートを請求システムが期待する形式に整形し直して」と依頼した。散文的な説明だけでは、実行のたびに一貫性のない変換が生成される。", "question": "What is the most effective way to get consistent, correct results?", "question_ja": "一貫した正しい結果を得る最も効果的な方法は何か？", "choices": {"A": "Provide 2-3 concrete input/output examples showing the exact transformation expected, rather than relying on the prose description alone", "B": "Repeat the prose description three times using different wording each time", "C": "Reduce max_tokens so the model has less room to improvise", "D": "Ask the model to guess the billing system's format from its training knowledge"}, "choices_ja": {"A": "散文的な説明だけに頼るのではなく、期待される正確な変換を示す2〜3個の具体的な入出力例を示す", "B": "毎回異なる言い回しで散文的な説明を3回繰り返す", "C": "モデルの即興の余地を減らすためmax_tokensを減らす", "D": "モデルにその学習知識から請求システムの形式を推測させる"}, "answer": "A", "explanation_ja": "散文的な説明だけでは解釈が一貫しない場合、具体的な入出力例（2〜3個）を示すのが最も効果的な反復的洗練技法。曖昧な変換要求ほど例示の効果が大きい。B は根本解決にならず、C/D は無関係・不確実。", "source": "materials/official/exam-guide.pdf (Task Statement 3.5)"}, {"id": "D4-q001", "statement_id": "D4-1", "scenario": "A prompt embeds a 20-page contract followed by analysis instructions. Claude sometimes treats sentences from the contract as instructions, and sometimes ignores parts of the actual instructions.", "scenario_ja": "あるプロンプトは20ページの契約書の後に分析指示を埋め込んでいる。Claudeは契約書中の文をときどき指示として扱ってしまい、また実際の指示の一部を無視してしまうこともある。", "question": "What is the most effective structural fix?", "question_ja": "最も効果的な構造上の修正は何か？", "choices": {"A": "Move the instructions to the middle of the contract so they are harder to miss", "B": "Wrap the contract in XML tags like <contract>...</contract> and the instructions in <instructions>...</instructions> so content and directives are unambiguous", "C": "Convert the entire prompt to uppercase for emphasis", "D": "Split the request into 20 separate API calls, one page each"}, "choices_ja": {"A": "見逃されにくいよう、指示を契約書の中央に移動する", "B": "契約書を<contract>...</contract>のようなXMLタグで囲み、指示を<instructions>...</instructions>で囲むことで、コンテンツと指示を明確に区別する", "C": "強調のためプロンプト全体を大文字に変換する", "D": "リクエストを1ページごとの20個の別々のAPI呼び出しに分割する"}, "answer": "B", "explanation_ja": "データ（文書）と指示の混同は XML タグによる構造化で解決するのが定石。タグは Claude が特別扱いするマーカーとして機能し、パーツの境界を明確にする。A/C は効果がなく、D はコストと文脈分断の問題を生む。", "source": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/use-xml-tags"}, {"id": "D4-q002", "statement_id": "D4-2", "scenario": "A classification prompt describes the desired output format in words ('Respond with the category name, a pipe, then a confidence from 0-100'), but Claude's outputs vary: sometimes prose, sometimes different separators.", "scenario_ja": "ある分類プロンプトは、望ましい出力形式を言葉で説明している（「カテゴリ名、パイプ記号、0〜100の信頼度で応答してください」）が、Claudeの出力はばらつく：あるときは散文で、あるときは異なる区切り文字を使う。", "question": "What is the most reliable prompt-level improvement?", "question_ja": "最も信頼できるプロンプトレベルの改善は何か？", "choices": {"A": "Add 3-5 few-shot examples showing exact input → output pairs in the desired format", "B": "Repeat the format description three times in the prompt", "C": "Raise max_tokens so Claude has room to comply", "D": "Add 'this is very important' before the format description"}, "choices_ja": {"A": "望ましい形式での正確な入力→出力のペアを示す3〜5個のfew-shot例を追加する", "B": "プロンプト内で形式の説明を3回繰り返す", "C": "Claudeが従うための余地を持てるようmax_tokensを上げる", "D": "形式の説明の前に「これは非常に重要です」を追加する"}, "answer": "A", "explanation_ja": "出力フォーマットのブレは few-shot（multishot）例示が最も効果的。具体例は言葉の説明より強く形式を規定する。B/D は限界がありスケールしない。C は無関係。（さらに確実性が必要なら構造化出力＝JSONスキーマの利用へ進む）", "source": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/multishot-prompting"}, {"id": "D4-q003", "statement_id": "D4-1", "scenario": "A financial-analysis prompt asks Claude for a final recommendation on a complex multi-factor decision. Answers are quick but frequently miss important considerations.", "scenario_ja": "ある財務分析プロンプトは、複雑な多要因の意思決定についてClaudeに最終的な推奨を求めている。回答は速いが、重要な考慮事項をしばしば見落としている。", "question": "Which technique most directly improves answer quality here?", "question_ja": "ここで回答の品質を最も直接的に改善する技法はどれか？", "choices": {"A": "Chain of thought: instruct Claude to reason through the factors step by step before giving the recommendation (or enable extended thinking)", "B": "Lower max_tokens to force more focused answers", "C": "Ask for the recommendation first, then the reasoning, so the answer is not biased", "D": "Split every factor into a separate unrelated conversation"}, "choices_ja": {"A": "Chain of thought：推奨を出す前に要因を段階的に推論するようClaudeに指示する（またはextended thinkingを有効にする）", "B": "より焦点を絞った回答を強制するためmax_tokensを下げる", "C": "答えが偏らないよう、まず推奨を求め、その後に理由付けを求める", "D": "すべての要因をそれぞれ無関係な別の会話に分割する"}, "answer": "A", "explanation_ja": "複雑な多要因の判断には Chain of Thought（段階的に考えさせてから結論）や extended thinking が有効。順序が重要で、推論→結論の順にする。C は逆（結論を先に出させると推論が後付けになる）。B は思考の余地を奪う。", "source": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/chain-of-thought"}, {"id": "D4-q004", "statement_id": "D4-3", "scenario": "A production pipeline parses Claude's JSON responses. About 2% of responses fail parsing due to markdown code fences, trailing commentary, or schema drift, and the team currently retries with modified prompts.", "scenario_ja": "ある本番パイプラインはClaudeのJSONレスポンスをパースしている。約2%のレスポンスが、Markdownのコードフェンス、末尾のコメント、スキーマのずれによりパースに失敗し、チームは現在プロンプトを修正してリトライしている。", "question": "What is the most robust solution?", "question_ja": "最も堅牢な解決策は何か？", "choices": {"A": "Add 'return ONLY valid JSON' in capital letters to the prompt", "B": "Use structured outputs: pass a JSON schema via output_config format so the API guarantees schema-valid output", "C": "Write a regex that strips everything before the first '{' and after the last '}'", "D": "Lower the temperature so outputs vary less"}, "choices_ja": {"A": "プロンプトに大文字で「有効なJSONのみを返してください」を追加する", "B": "構造化出力を使う：output_configのformatを介してJSONスキーマを渡し、APIがスキーマに準拠した出力を保証するようにする", "C": "最初の'{'より前とすべて最後の'}'より後を取り除く正規表現を書く", "D": "出力のばらつきを減らすためtemperatureを下げる"}, "answer": "B", "explanation_ja": "確実な JSON が必要なら構造化出力（output_config の format に json_schema を指定）が正解。API レベルでスキーマ準拠が保証される。A は改善するが保証がない、C は場当たり的で schema drift に無力、D は根本解決にならない（最新モデルではサンプリングパラメータ自体が使えない場合もある）。", "source": "https://platform.claude.com/docs/en/build-with-claude/structured-outputs"}, {"id": "D4-q005", "statement_id": "D4-3", "scenario": "A team needs to extract structured contact records from free-form emails. They want schema-validated fields AND they are on an API surface where they prefer defining the schema as part of tool use.", "scenario_ja": "あるチームは、自由形式のメールから構造化された連絡先レコードを抽出する必要がある。スキーマ検証されたフィールドが欲しく、かつツール利用の一部としてスキーマを定義することを好むAPIサーフェスを使っている。", "question": "Which approach implements tool-based JSON extraction?", "question_ja": "ツールベースのJSON抽出を実装するアプローチはどれか？", "choices": {"A": "Define a tool (e.g. record_contact) whose input_schema is the desired record schema, and force its use with tool_choice, then read the arguments from the tool_use block", "B": "Define a tool that returns the email text back to Claude for a second pass", "C": "Ask Claude to call an imaginary tool in plain text and parse the text", "D": "Use stop sequences to cut the response at the end of the JSON"}, "choices_ja": {"A": "望ましいレコードスキーマをinput_schemaとして持つツール（例：record_contact）を定義し、tool_choiceでその使用を強制し、tool_useブロックから引数を読む", "B": "2回目のパスのためにメール本文をClaudeに送り返すツールを定義する", "C": "Claudeにプレーンテキストで架空のツールを呼び出させ、そのテキストをパースする", "D": "JSONの終端でレスポンスを打ち切るためstop sequencesを使う"}, "answer": "A", "explanation_ja": "tool-based extraction は『抽出したいスキーマを input_schema に持つツールを定義し、tool_choice で強制、tool_use ブロックの input を読む』パターン。モデルはスキーマに従った引数を生成する。strict: true を付ければさらに厳密。C は擬似ツールで信頼性がない。D は構造保証にならない。", "source": "https://platform.claude.com/docs/en/agents-and-tools/tool-use/define-tools"}, {"id": "D4-q006", "statement_id": "D4-1", "scenario": "A legal-tech product needs Claude to consistently respond as a cautious legal analyst across thousands of API calls: same persona, same constraints, same output conventions.", "scenario_ja": "あるリーガルテック製品は、数千回のAPI呼び出しにわたって、Claudeが慎重な法務アナリストとして一貫して応答する必要がある：同じペルソナ、同じ制約、同じ出力の慣習を保つ。", "question": "Where should this persona definition live?", "question_ja": "このペルソナ定義はどこに置くべきか？", "choices": {"A": "In the system prompt (system parameter), defining the role, task framing, and constraints once for every request", "B": "Repeated at the start of every user message", "C": "In the first assistant message as a self-introduction", "D": "In tool descriptions, since they are read most carefully"}, "choices_ja": {"A": "システムプロンプト（systemパラメータ）に置き、すべてのリクエストに対して役割・タスクの枠組み・制約を一度だけ定義する", "B": "すべてのuserメッセージの冒頭で繰り返す", "C": "自己紹介として最初のassistantメッセージに置く", "D": "最も注意深く読まれるため、ツールの説明文に置く"}, "answer": "A", "explanation_ja": "役割（role）とタスクの枠組みは system プロンプトに置くのが基本。全リクエストに一貫して効き、キャッシュ効率も良い（安定した接頭辞）。B は冗長でキャッシュを乱し、C/D は本来の用途ではなく効果も不安定。", "source": "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/system-prompts"}, {"id": "D4-q007", "statement_id": "D4-5", "scenario": "A company must classify 80,000 archived documents. There is no latency requirement — results are needed within a day — and cost matters.", "scenario_ja": "ある企業は8万件のアーカイブ文書を分類しなければならない。レイテンシ要件はなく（結果は1日以内に必要）、コストが重要である。", "question": "What is the most cost-effective approach?", "question_ja": "最もコスト効率の良いアプローチは何か？", "choices": {"A": "Send 80,000 sequential Messages API requests with a large model", "B": "Use the Message Batches API, which processes requests asynchronously at 50% of standard prices (most batches complete within an hour, max 24 hours)", "C": "Send all 80,000 documents in one giant request to save on per-request overhead", "D": "Use streaming to reduce token costs"}, "choices_ja": {"A": "大きなモデルを使って8万回の逐次的なMessages APIリクエストを送信する", "B": "標準価格の50%で非同期に処理されるMessage Batches APIを使う（ほとんどのバッチは1時間以内に完了、最大24時間）", "C": "リクエストごとのオーバーヘッドを節約するため、8万件の文書すべてを1つの巨大なリクエストで送る", "D": "トークンコストを減らすためストリーミングを使う"}, "answer": "B", "explanation_ja": "レイテンシ要件がない大量処理は Batch API 一択：全トークン50%引き、非同期で最大24時間以内に処理。1バッチ最大10万リクエスト。C は 1リクエストのコンテキスト上限を超えるし、そもそも安くならない。D のストリーミングは配信方式でありコストは変わらない。モデルの選択（Haiku等）も併用できる。", "source": "https://platform.claude.com/docs/en/build-with-claude/batch-processing"}, {"id": "D4-q008", "statement_id": "D4-6", "scenario": "A team asks the same Claude conversation that wrote a piece of code to review it for bugs. The review consistently reports 'no issues', yet bugs are later found in production.", "scenario_ja": "あるチームは、コードを書いたのと同じClaudeの会話に、バグがないかそのコードをレビューさせている。レビューは一貫して「問題なし」と報告するが、後になって本番環境でバグが見つかる。", "question": "What is the architectural lesson?", "question_ja": "アーキテクチャ上の教訓は何か？", "choices": {"A": "Claude cannot review code at all; only humans should review", "B": "Self-review within the same context is limited — the model is anchored by its own reasoning; use an independent instance with fresh context (and ideally a review-focused prompt) for critique", "C": "The review prompt needs the word 'CRITICAL' added", "D": "Reviews should run at a higher temperature for more creativity"}, "choices_ja": {"A": "Claudeはコードレビューをまったくできない。人間だけがレビューすべきである", "B": "同一コンテキスト内でのself-reviewには限界がある——モデルは自分自身の推論にアンカリングされてしまう。批評には新しいコンテキストを持つ独立したインスタンス（理想的にはレビューに特化したプロンプト）を使うべきである", "C": "レビュープロンプトに「CRITICAL」という単語を追加する必要がある", "D": "レビューはより創造性を発揮できるよう、より高いtemperatureで実行すべきである"}, "answer": "B", "explanation_ja": "同一コンテキストでの self-review は自分の推論・前提にアンカリングされ欠陥を見逃しやすい。独立したコンテキスト（別インスタンス・レビュー専用プロンプト）でのレビューが有効。信頼性設計の定石で、Claude Code のサブエージェントレビューも同じ発想。A は極端、C/D は本質でない。", "source": "https://platform.claude.com/docs/en/test-and-evaluate/strengthen-guardrails/increase-consistency"}, {"id": "D4-q009", "statement_id": "D4-4", "scenario": "An extraction pipeline validates output against a Pydantic schema. On failure, the current implementation simply resends the exact same request unchanged, hoping for a different result.", "scenario_ja": "ある抽出パイプラインは出力をPydanticスキーマに対して検証している。失敗した場合、現在の実装は単に元とまったく同じリクエストを変更せず再送し、異なる結果が出ることを期待している。", "question": "What change would make the retry loop actually effective, and when should retries be abandoned?", "question_ja": "リトライループを実際に効果的にする変更は何か。また、いつリトライを諦めるべきか？", "choices": {"A": "On retry, append the original document, the failed extraction, and the specific validation error to the prompt so the model can self-correct; abandon retries when the required information is simply absent from the source document rather than a format issue", "B": "Always retry exactly three times with the unchanged original prompt, regardless of the error type", "C": "Lower the temperature on every retry until the output validates", "D": "Switch to a larger model on the first failure without changing the prompt"}, "choices_ja": {"A": "リトライ時には、元の文書、失敗した抽出結果、そして具体的な検証エラーをプロンプトに追加し、モデルが自己修正できるようにする。必要な情報が単に元の文書に存在しない場合（形式の問題ではない場合）はリトライを諦める", "B": "エラーの種類に関わらず、変更しない元のプロンプトで常にちょうど3回リトライする", "C": "出力が検証を通るまで、リトライのたびにtemperatureを下げる", "D": "プロンプトを変更せず、最初の失敗でより大きなモデルに切り替える"}, "answer": "A", "explanation_ja": "有効なリトライは『具体的な検証エラーをプロンプトに追加して自己修正させる』こと。ただし情報がそもそも文書に存在しない場合（構造・書式の問題ではない）はリトライしても無意味なので見切りが必要。B は変更なしの盲目的リトライで効果が薄い。C/D は根本原因（欠落情報 vs 形式エラー）に対処していない。", "source": "materials/official/exam-guide.pdf (Task Statement 4.4)"}, {"id": "D5-q001", "statement_id": "D5-4", "scenario": "A developer sets \"model\": \"opus\" in ~/.claude/settings.json (user scope), but the project's .claude/settings.json sets \"model\": \"sonnet\". The developer also has .claude/settings.local.json with \"model\": \"haiku\".", "scenario_ja": "ある開発者は~/.claude/settings.json（ユーザースコープ）で\"model\": \"opus\"を設定しているが、プロジェクトの.claude/settings.jsonでは\"model\": \"sonnet\"が設定されている。この開発者はさらに.claude/settings.local.jsonで\"model\": \"haiku\"を設定している。", "question": "Which model applies in this project, and why?", "question_ja": "このプロジェクトではどのモデルが適用されるか、またその理由は？", "choices": {"A": "opus — user settings always win because they are the most personal", "B": "sonnet — project settings override local settings", "C": "haiku — local settings take precedence over shared project settings, which take precedence over user settings", "D": "The session fails to start because conflicting values are an error"}, "choices_ja": {"A": "opus——ユーザー設定は最も個人的なものであるため常に優先される", "B": "sonnet——プロジェクト設定はローカル設定より優先される", "C": "haiku——ローカル設定は共有プロジェクト設定より優先され、共有プロジェクト設定はユーザー設定より優先される", "D": "値が競合しているためエラーとなりセッションは開始できない"}, "answer": "C", "explanation_ja": "settings の優先順位は（managed を除くと）local > project > user。より具体的なスコープが勝つ。したがって settings.local.json の haiku が適用される。なお permission ルールは上書きではなく『マージ』される点も併せて押さえる。", "source": "https://code.claude.com/docs/en/settings"}, {"id": "D5-q002", "statement_id": "D5-1", "scenario": "A long-running agent conversation is approaching the model's context window limit, and the team must keep the session going without losing the thread of the work.", "scenario_ja": "長時間実行されているエージェントの会話がモデルのコンテキストウィンドウの上限に近づいており、チームは作業の流れを失うことなくセッションを継続しなければならない。", "question": "Which technique directly addresses this?", "question_ja": "この問題に直接対処する技法はどれか？", "choices": {"A": "Compaction: summarize earlier context (server-side compaction or harness-level summarization) so the conversation can continue within the window", "B": "Raise max_tokens, which increases the context window", "C": "Delete the system prompt to free space", "D": "Switch stop sequences to shorter strings"}, "choices_ja": {"A": "コンパクション：以前のコンテキストを要約する（サーバーサイドのcompaction、またはハーネスレベルの要約）ことで会話をウィンドウ内で継続できるようにする", "B": "コンテキストウィンドウを増やすmax_tokensを上げる", "C": "スペースを空けるためシステムプロンプトを削除する", "D": "stop sequencesをより短い文字列に切り替える"}, "answer": "A", "explanation_ja": "コンテキスト上限への対処はコンパクション（過去の履歴を要約に置き換える）。API のサーバーサイド compaction、または Claude Code の /compact のようなハーネス側要約がこれにあたる。max_tokens は『出力』の上限でありコンテキストウィンドウは増えない（B は頻出のひっかけ）。C は挙動を壊し、D は無関係。", "source": "https://platform.claude.com/docs/en/build-with-claude/context-windows"}, {"id": "D5-q003", "statement_id": "D5-3", "scenario": "In a multi-agent pipeline, a subagent's database tool fails intermittently. The current implementation silently drops failed tool calls, so the orchestrator receives incomplete data without knowing anything went wrong.", "scenario_ja": "あるマルチエージェントパイプラインでは、サブエージェントのデータベースツールが断続的に失敗する。現在の実装は失敗したツール呼び出しを黙って破棄しているため、オーケストレーターは何か問題が起きたことを知らないまま不完全なデータを受け取っている。", "question": "What is the correct error-propagation pattern?", "question_ja": "正しいエラー伝播のパターンは何か？", "choices": {"A": "Return a tool_result with is_error: true and an informative message so the model can adapt, and surface persistent failures to the orchestrator for escalation", "B": "Retry silently forever until the tool succeeds", "C": "Terminate the entire pipeline on any single tool failure", "D": "Have the subagent fabricate plausible data so the pipeline continues smoothly"}, "choices_ja": {"A": "is_error: trueと有用なメッセージを持つtool_resultを返し、モデルが適応できるようにする。継続的な失敗はエスカレーションのためオーケストレーターに表面化させる", "B": "ツールが成功するまで永遠に黙ってリトライする", "C": "1つでもツールが失敗したらパイプライン全体を終了する", "D": "パイプラインが滞りなく続くよう、サブエージェントにもっともらしいデータを捏造させる"}, "answer": "A", "explanation_ja": "エラーは隠さず構造化して伝える：tool_result に is_error: true と有用なメッセージを入れればモデルはリトライや代替手段を選べる。継続的な失敗は上位（オーケストレーター/人間）へエスカレーション。B は停止しない恐れ、C は過剰、D は最悪（サイレントなデータ汚染）。", "source": "https://platform.claude.com/docs/en/agents-and-tools/tool-use/handle-tool-calls"}, {"id": "D5-q004", "statement_id": "D5-5", "scenario": "Your document extraction system reports 97% overall accuracy, so the team plans to remove human review entirely. A closer look shows the 97% figure blends near-perfect performance on invoices with much worse performance on handwritten receipts, which make up a small fraction of volume.", "scenario_ja": "あなたの文書抽出システムは全体で97%の精度を報告しているため、チームは人間によるレビューを完全に廃止しようと計画している。詳しく見ると、この97%という数字は請求書に対するほぼ完璧な性能と、少量ながら手書きの領収書に対するはるかに低い性能を混ぜ合わせたものである。", "question": "What should the team do before reducing human review further?", "question_ja": "チームは人間によるレビューをさらに減らす前に何をすべきか？", "choices": {"A": "Analyze accuracy segmented by document type and field, and use stratified random sampling plus field-level confidence calibration to decide where review is still needed", "B": "Trust the 97% aggregate figure and remove review for all document types immediately", "C": "Remove review only for invoices, since they are the majority of volume, without checking other segments", "D": "Increase the overall sample size used to compute the aggregate accuracy figure"}, "choices_ja": {"A": "文書種別とフィールド別に精度を分析し、層化ランダムサンプリングとフィールド単位の信頼度較正を用いて、どこにまだレビューが必要かを判断する", "B": "97%という集計値を信頼し、すべての文書種別についてただちにレビューを廃止する", "C": "他のセグメントを確認せずに、量が多いという理由だけで請求書についてのみレビューを廃止する", "D": "集計精度を算出するために使うサンプルサイズ全体を増やす"}, "answer": "A", "explanation_ja": "集計精度（97%）は特定セグメント（手書き領収書）の低性能を覆い隠す危険がある。文書種別・フィールド単位での精度分析と層化ランダムサンプリング、信頼度較正によって、どこにレビューが必要かを判断すべき。B は危険、C は他セグメントを未検証のまま放置、D は集計自体の粒度を上げるだけで根本問題（セグメント別分析の欠如）を解決しない。", "source": "materials/official/exam-guide.pdf (Task Statement 5.5)"}, {"id": "D5-q005", "statement_id": "D5-6", "scenario": "A multi-agent research system's synthesis agent combines two credible sources that report different statistics for the same metric (e.g., different market size figures), and one source is from three years ago while the other is recent.", "scenario_ja": "あるマルチエージェントのリサーチシステムの統合エージェントは、同じ指標（例：異なる市場規模の数字）について異なる統計を報告する2つの信頼できる情報源を組み合わせている。一方の情報源は3年前のもので、もう一方は最近のものである。", "question": "What is the correct way to handle this in the synthesized report?", "question_ja": "統合されたレポートの中でこれをどう扱うのが正しいか？", "choices": {"A": "Preserve both values with their source attribution and publication dates, and annotate the discrepancy rather than arbitrarily picking one; distinguish well-established findings from contested ones", "B": "Silently use the more recent source's number since it is presumably more accurate", "C": "Average the two statistics to produce a single blended figure", "D": "Omit the metric entirely from the report to avoid presenting conflicting information"}, "choices_ja": {"A": "出典と発行日を付けて両方の値を保持し、恣意的にどちらかを選ぶのではなく食い違いを注記する。十分に確立された知見と議論の余地がある知見を区別する", "B": "おそらくより正確であろうという理由で、より新しい情報源の数字を黙って使う", "C": "2つの統計を平均して単一の混合された数値を出す", "D": "矛盾する情報を提示しないよう、その指標をレポートから完全に省く"}, "answer": "A", "explanation_ja": "情報の出所（provenance）を保持することが原則：両方の値を出典・日付付きで残し、矛盾は明示的に注記する。恣意的な一方選択（B）や平均化（C）は情報を歪める。日付情報があれば時系列差を矛盾と誤解することも防げる。D は有用な情報を単に隠すだけ。", "source": "materials/official/exam-guide.pdf (Task Statement 5.6)"}, {"id": "OFFICIAL-q001", "statement_id": "D1-4", "scenario": "Production data shows that in 12% of cases, your agent skips get_customer entirely and calls lookup_order using only the customer's stated name, occasionally leading to misidentified accounts and incorrect refunds.", "scenario_ja": "本番データによると、12%のケースであなたのエージェントはget_customerを完全にスキップし、顧客が申告した名前だけを使ってlookup_orderを呼び出しており、時折アカウントの誤認や誤った返金につながっている。", "question": "What change would most effectively address this reliability issue?", "question_ja": "この信頼性の問題に最も効果的に対処する変更は何か？", "choices": {"A": "Add a programmatic prerequisite that blocks lookup_order and process_refund calls until get_customer has returned a verified customer ID.", "B": "Enhance the system prompt to state that customer verification via get_customer is mandatory before any order operations.", "C": "Add few-shot examples showing the agent always calling get_customer first, even when customers volunteer order details.", "D": "Implement a routing classifier that analyzes each request and enables only the subset of tools appropriate for that request type."}, "choices_ja": {"A": "get_customerが検証済みの顧客IDを返すまで、lookup_orderとprocess_refundの呼び出しをブロックするプログラム的な前提条件を追加する", "B": "注文操作の前にget_customerによる顧客確認が必須であることを述べるよう、システムプロンプトを強化する", "C": "顧客が注文の詳細を自発的に伝えた場合でも、エージェントが常に最初にget_customerを呼び出すことを示すfew-shot例を追加する", "D": "各リクエストを分析し、そのリクエストタイプに適したツールのサブセットのみを有効化するルーティング分類器を実装する"}, "answer":
