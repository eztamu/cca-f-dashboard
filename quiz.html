 "A", "explanation_ja": "重要な業務ロジック（払い戻し前の本人確認など）で特定のツール順序が必須な場合、プログラム的強制は決定的な保証を与えるが、プロンプトベースの方法（B・C）は確率的な遵守しか得られず、金銭的影響がある場面では不十分。D はツールの利用可否の話でありツール『順序』の問題を解決しない。", "source": "materials/official/exam-guide.pdf (Sample Question 1)"}, {"id": "OFFICIAL-q002", "statement_id": "D2-1", "scenario": "Production logs show the agent frequently calls get_customer when users ask about orders (e.g., \"check my order #12345\"), instead of calling lookup_order. Both tools have minimal descriptions (\"Retrieves customer information\" / \"Retrieves order details\") and accept similar identifier formats.", "scenario_ja": "本番ログによると、ユーザーが注文について尋ねたとき（例：「注文番号12345を確認して」）、エージェントはlookup_orderではなくget_customerを頻繁に呼び出している。両方のツールとも説明が最小限（「顧客情報を取得する」／「注文詳細を取得する」）であり、似たような識別子形式を受け付ける。", "question": "What's the most effective first step to improve tool selection reliability?", "question_ja": "ツール選択の信頼性を改善する最も効果的な最初のステップは何か？", "choices": {"A": "Add few-shot examples to the system prompt demonstrating correct tool selection patterns, with 5-8 examples showing order-related queries routing to lookup_order.", "B": "Expand each tool's description to include input formats it handles, example queries, edge cases, and boundaries explaining when to use it versus similar tools.", "C": "Implement a routing layer that parses user input before each turn and pre-selects the appropriate tool based on detected keywords and identifier patterns.", "D": "Consolidate both tools into a single lookup_entity tool that accepts any identifier and internally determines which backend to query."}, "choices_ja": {"A": "注文関連のクエリがlookup_orderにルーティングされることを示す5〜8個の例を含む、正しいツール選択パターンを示すfew-shot例をシステムプロンプトに追加する", "B": "各ツールの説明を拡張し、扱う入力形式、クエリの例、エッジケース、似たツールとの使い分けの境界を含める", "C": "各ターンの前にユーザー入力を解析し、検出されたキーワードと識別子パターンに基づいて適切なツールを事前選択するルーティング層を実装する", "D": "任意の識別子を受け付け内部でどのバックエンドに問い合わせるかを判断する単一のlookup_entityツールに両方のツールを統合する"}, "answer": "B", "explanation_ja": "ツールの説明文はLLMがツール選択に使う主要な手がかり。説明が最小限だと似たツールを区別できない。B は根本原因に対する低コスト・高レバレッジな修正。A はトークンオーバーヘッドを増やすが根本解決にならず、C は過剰設計でLLMの自然言語理解を迂回、D は有効な設計選択肢だが『最初の一手』としては大掛かりすぎる。", "source": "materials/official/exam-guide.pdf (Sample Question 2)"}, {"id": "OFFICIAL-q003", "statement_id": "D5-2", "scenario": "Your agent achieves 55% first-contact resolution, well below the 80% target. Logs show it escalates straightforward cases (standard damage replacements with photo evidence) while attempting to autonomously handle complex situations requiring policy exceptions.", "scenario_ja": "あなたのエージェントは初回対応解決率55%を達成しており、目標の80%を大きく下回っている。ログによると、写真証拠付きの標準的な破損交換のような単純なケースをエスカレーションする一方で、ポリシー例外を必要とする複雑な状況を自律的に処理しようとしている。", "question": "What's the most effective way to improve escalation calibration?", "question_ja": "エスカレーションの較正を改善する最も効果的な方法は何か？", "choices": {"A": "Add explicit escalation criteria to your system prompt with few-shot examples demonstrating when to escalate versus resolve autonomously.", "B": "Have the agent self-report a confidence score (1-10) before each response and automatically route requests to humans when confidence falls below a threshold.", "C": "Deploy a separate classifier model trained on historical tickets to predict which requests need escalation before the main agent begins processing.", "D": "Implement sentiment analysis to detect customer frustration levels and automatically escalate when negative sentiment exceeds a threshold."}, "choices_ja": {"A": "自律的に解決すべき場合とエスカレーションすべき場合を示すfew-shot例とともに、明示的なエスカレーション基準をシステムプロンプトに追加する", "B": "各応答の前にエージェントに信頼度スコア（1〜10）を自己申告させ、信頼度が閾値を下回った場合は自動的にリクエストを人間にルーティングする", "C": "メインのエージェントが処理を始める前に、どのリクエストがエスカレーションを必要とするかを予測する、過去のチケットで訓練された別の分類器モデルをデプロイする", "D": "顧客の不満レベルを検知する感情分析を実装し、ネガティブな感情が閾値を超えたら自動的にエスカレーションする"}, "answer": "A", "explanation_ja": "明示的なエスカレーション基準とfew-shot例は『判断境界が不明確』という根本原因に直接対処する、段階的に妥当な最初の対応。B はLLMの自己申告信頼度が既に誤って高いため機能しない。C はプロンプト最適化を試す前のオーバーエンジニアリング。D は感情と案件の複雑さは相関しないため見当違い。", "source": "materials/official/exam-guide.pdf (Sample Question 3)"}, {"id": "OFFICIAL-q004", "statement_id": "D3-2", "scenario": "You want to create a custom /review slash command that runs your team's standard code review checklist. This command should be available to every developer when they clone or pull the repository.", "scenario_ja": "あなたは、チームの標準的なコードレビューチェックリストを実行するカスタムの/reviewスラッシュコマンドを作成したいと考えている。このコマンドは、開発者がリポジトリをクローンまたはプルしたときに、すべての開発者が利用できるようにする必要がある。", "question": "Where should you create this command file?", "question_ja": "このコマンドファイルはどこに作成すべきか？", "choices": {"A": "In the .claude/commands/ directory in the project repository", "B": "In ~/.claude/commands/ in each developer's home directory", "C": "In the CLAUDE.md file at the project root", "D": "In a .claude/config.json file with a commands array"}, "choices_ja": {"A": "プロジェクトリポジトリ内の.claude/commands/ディレクトリ", "B": "各開発者のホームディレクトリの~/.claude/commands/", "C": "プロジェクトルートのCLAUDE.mdファイル", "D": "commands配列を持つ.claude/config.jsonファイル"}, "answer": "A", "explanation_ja": "プロジェクトスコープのカスタムスラッシュコマンドは .claude/commands/ に置く。バージョン管理され、clone/pull した全開発者に自動的に共有される。B はバージョン管理外の個人用コマンド。C は指示・文脈用でコマンド定義用ではない。D はClaude Codeに存在しない仕組み。", "source": "materials/official/exam-guide.pdf (Sample Question 4)"}, {"id": "OFFICIAL-q005", "statement_id": "D3-4", "scenario": "You've been assigned to restructure the team's monolithic application into microservices. This will involve changes across dozens of files and requires decisions about service boundaries and module dependencies.", "scenario_ja": "あなたはチームのモノリシックなアプリケーションをマイクロサービスに再構成する任務を割り当てられた。これは数十のファイルにわたる変更を伴い、サービス境界とモジュールの依存関係についての判断を必要とする。", "question": "Which approach should you take?", "question_ja": "どのアプローチを取るべきか？", "choices": {"A": "Enter plan mode to explore the codebase, understand dependencies, and design an implementation approach before making changes.", "B": "Start with direct execution and make changes incrementally, letting the implementation reveal the natural service boundaries.", "C": "Use direct execution with comprehensive upfront instructions detailing exactly how each service should be structured.", "D": "Begin in direct execution mode and only switch to plan mode if you encounter unexpected complexity during implementation."}, "choices_ja": {"A": "変更を加える前に、コードベースを探索し依存関係を理解し実装アプローチを設計するため、plan modeに入る", "B": "直接実行から始め、段階的に変更を加え、実装が自然なサービス境界を明らかにするに任せる", "C": "各サービスをどう構造化すべきかを詳細に示す包括的な事前指示を伴う直接実行を使う", "D": "直接実行モードで始め、実装中に予期しない複雑さに遭遇した場合にのみplan modeに切り替える"}, "answer": "A", "explanation_ja": "plan mode は大規模な変更・複数の妥当なアプローチ・アーキテクチャ判断が伴うタスクに向いており、変更を確定する前に安全な探索と設計を可能にする——モノリスからマイクロサービスへの再構成はまさにその典型。B は依存関係を後から発見してコストのかかる手戻りを招くリスク、C は正しい構造を探索せずに前提してしまっている、D は要件自体が既に複雑であることを無視している。", "source": "materials/official/exam-guide.pdf (Sample Question 5)"}, {"id": "OFFICIAL-q006", "statement_id": "D3-3", "scenario": "Your codebase has distinct areas with different coding conventions: React components use functional style with hooks, API handlers use async/await with specific error handling, and database models follow a repository pattern. Test files are spread throughout the codebase alongside the code they test (e.g., Button.test.tsx next to Button.tsx), and you want all tests to follow the same conventions regardless of location.", "scenario_ja": "あなたのコードベースには異なるコーディング規約を持つ明確な領域がある：Reactコンポーネントはフックを使った関数型スタイル、APIハンドラーは特定のエラー処理を伴うasync/await、データベースモデルはリポジトリパターンに従う。テストファイルはテスト対象のコードのそばにコードベース全体に散らばっており（例：Button.test.tsxはButton.tsxの隣）、場所に関わらずすべてのテストが同じ規約に従ってほしいと考えている。", "question": "What's the most maintainable way to ensure Claude automatically applies the correct conventions when generating code?", "question_ja": "Claudeがコード生成時に正しい規約を自動的に適用することを保証する最も保守しやすい方法は何か？", "choices": {"A": "Create rule files in .claude/rules/ with YAML frontmatter specifying glob patterns to conditionally apply conventions based on file paths", "B": "Consolidate all conventions in the root CLAUDE.md file under headers for each area, relying on Claude to infer which section applies", "C": "Create skills in .claude/skills/ for each code type that include the relevant conventions in their SKILL.md files", "D": "Place a separate CLAUDE.md file in each subdirectory containing that area's specific conventions"}, "choices_ja": {"A": "ファイルパスに基づいて規約を条件付きで適用するグロブパターンを指定したYAMLフロントマターを持つルールファイルを.claude/rules/に作成する", "B": "各領域のヘッダーの下にすべての規約をルートのCLAUDE.mdファイルに統合し、どのセクションが適用されるかはClaudeの推論に任せる", "C": "関連する規約をSKILL.mdファイルに含む、各コードタイプ用のskillを.claude/skills/に作成する", "D": "各サブディレクトリに、その領域固有の規約を含む別々のCLAUDE.mdファイルを配置する"}, "answer": "A", "explanation_ja": ".claude/rules/ のグロブパターン（例: **/*.test.tsx）はファイルパスに基づき規約を自動適用でき、ディレクトリ横断的に散らばるテストファイルに必須。B は推論任せで信頼性が低い、C は手動起動またはClaude任せの読み込みになり『自動適用』という要件に反する、D はディレクトリに紐づくためファイルが多方向に散らばるケースに対応しづらい。", "source": "materials/official/exam-guide.pdf (Sample Question 6)"}, {"id": "OFFICIAL-q007", "statement_id": "D1-2", "scenario": "After running the system on the topic \"impact of AI on creative industries,\" you observe that each subagent completes successfully: the web search agent finds relevant articles, the document analysis agent summarizes papers correctly, and the synthesis agent produces coherent output. However, the final reports cover only visual arts, completely missing music, writing, and film production. When you examine the coordinator's logs, you see it decomposed the topic into three subtasks: \"AI in digital art creation,\" \"AI in graphic design,\" and \"AI in photography.\"", "scenario_ja": "「AIがクリエイティブ産業に与える影響」というトピックでシステムを実行した後、各サブエージェントは正常に完了していることが分かった：Web検索エージェントは関連記事を見つけ、文書分析エージェントは論文を正しく要約し、統合エージェントは首尾一貫した出力を生成した。しかし最終レポートは視覚芸術のみを扱っており、音楽・執筆・映画制作を完全に見落としている。コーディネーターのログを調べると、トピックを「デジタルアートにおけるAI」「グラフィックデザインにおけるAI」「写真におけるAI」という3つのサブタスクに分解していたことが分かった。", "question": "What is the most likely root cause?", "question_ja": "最も可能性の高い根本原因は何か？", "choices": {"A": "The synthesis agent lacks instructions for identifying coverage gaps in the findings it receives from other agents.", "B": "The coordinator agent's task decomposition is too narrow, resulting in subagent assignments that don't cover all relevant domains of the topic.", "C": "The web search agent's queries are not comprehensive enough and need to be expanded to cover more creative industry sectors.", "D": "The document analysis agent is filtering out sources related to non-visual creative industries due to overly restrictive relevance criteria."}, "choices_ja": {"A": "統合エージェントには、他のエージェントから受け取った所見の中でカバレッジのギャップを特定するための指示が欠けている", "B": "コーディネーターエージェントのタスク分解が狭すぎるため、トピックの関連するすべての領域をカバーしていないサブエージェントの割り当てになっている", "C": "Web検索エージェントのクエリが十分に包括的でなく、より多くのクリエイティブ産業のセクターをカバーするよう拡張する必要がある", "D": "文書分析エージェントは過度に制限的な関連性基準により、視覚芸術以外のクリエイティブ産業に関連する情報源をフィルタリングして除外している"}, "answer": "B", "explanation_ja": "コーディネーターのログが根本原因を直接示している：『creative industries』を視覚芸術のサブタスクのみに分解し、音楽・執筆・映画を完全に見落としている。サブエージェントは割り当てられたタスクを正しく実行しており、問題は『何を割り当てたか』にある。A・C・D は正しく動作している下流エージェントを誤って責めている。", "source": "materials/official/exam-guide.pdf (Sample Question 7)"}, {"id": "OFFICIAL-q008", "statement_id": "D5-3", "scenario": "The web search subagent times out while researching a complex topic. You need to design how this failure information flows back to the coordinator agent.", "scenario_ja": "Web検索サブエージェントが複雑なトピックを調査中にタイムアウトした。あなたはこの失敗情報がどのようにコーディネーターエージェントに伝わるべきかを設計する必要がある。", "question": "Which error propagation approach best enables intelligent recovery?", "question_ja": "賢明な復旧を最も可能にするエラー伝播のアプローチはどれか？", "choices": {"A": "Return structured error context to the coordinator including the failure type, the attempted query, any partial results, and potential alternative approaches.", "B": "Implement automatic retry logic with exponential backoff within the subagent, returning a generic \"search unavailable\" status only after all retries are exhausted.", "C": "Catch the timeout within the subagent and return an empty result set marked as successful.", "D": "Propagate the timeout exception directly to a top-level handler that terminates the entire research workflow."}, "choices_ja": {"A": "失敗の種類、試みたクエリ、部分的な結果、潜在的な代替アプローチを含む構造化されたエラーコンテキストをコーディネーターに返す", "B": "サブエージェント内で指数バックオフによる自動リトライロジックを実装し、すべてのリトライが尽きた後にのみ一般的な「検索利用不可」ステータスを返す", "C": "サブエージェント内でタイムアウトを捕捉し、成功としてマークされた空の結果セットを返す", "D": "タイムアウト例外を、リサーチワークフロー全体を終了させるトップレベルのハンドラーに直接伝播させる"}, "answer": "A", "explanation_ja": "構造化エラーコンテキストは、コーディネーターが賢い復旧判断（クエリを変えて再試行するか、代替手法を試すか、部分結果で進めるか）を下すために必要な情報を与える。B の画一的ステータスは有用な文脈を隠す、C は失敗を成功として隠蔽し復旧の機会を失わせる、D は復旧できる可能性があるのに不必要にワークフロー全体を止めてしまう。", "source": "materials/official/exam-guide.pdf (Sample Question 8)"}, {"id": "OFFICIAL-q009", "statement_id": "D2-3", "scenario": "During testing, you observe that the synthesis agent frequently needs to verify specific claims while combining findings. Currently, when verification is needed, the synthesis agent returns control to the coordinator, which invokes the web search agent, then re-invokes synthesis with results. This adds 2-3 round trips per task and increases latency by 40%. Your evaluation shows that 85% of these verifications are simple fact-checks (dates, names, statistics) while 15% require deeper investigation.", "scenario_ja": "テスト中、統合エージェントは所見を組み合わせる際に特定の主張を検証する必要が頻繁にあることが分かった。現在、検証が必要な場合、統合エージェントは制御をコーディネーターに戻し、コーディネーターがWeb検索エージェントを呼び出し、その後結果とともに統合エージェントを再度呼び出している。これはタスクごとに2〜3回の往復を追加し、レイテンシを40%増加させている。評価によると、これらの検証の85%は単純なファクトチェック（日付、名前、統計）であり、15%はより深い調査を必要とする。", "question": "What's the most effective approach to reduce overhead while maintaining system reliability?", "question_ja": "システムの信頼性を維持しながらオーバーヘッドを削減する最も効果的なアプローチは何か？", "choices": {"A": "Give the synthesis agent a scoped verify_fact tool for simple lookups, while complex verifications continue delegating to the web search agent through the coordinator.", "B": "Have the synthesis agent accumulate all verification needs and return them as a batch to the coordinator at the end of its pass, which then sends them all to the web search agent at once.", "C": "Give the synthesis agent access to all web search tools so it can handle any verification need directly without round-trips through the coordinator.", "D": "Have the web search agent proactively cache extra context around each source during initial research, anticipating what the synthesis agent might need to verify."}, "choices_ja": {"A": "単純な検索用にスコープを絞ったverify_factツールを統合エージェントに与え、複雑な検証は引き続きコーディネーターを介してWeb検索エージェントに委譲する", "B": "統合エージェントにすべての検証ニーズを蓄積させ、パスの最後にまとめてコーディネーターに返し、コーディネーターがそれらすべてを一度にWeb検索エージェントに送る", "C": "統合エージェントにすべてのWeb検索ツールへのアクセスを与え、コーディネーターを介した往復なしにあらゆる検証ニーズを直接処理できるようにする", "D": "統合エージェントが後で何を検証したくなるかを予測して、Web検索エージェントに初期リサーチ中に各情報源の周辺の追加コンテキストを事前にキャッシュさせる"}, "answer": "A", "explanation_ja": "最小権限の原則を適用し、85%を占める単純なケース（簡易ファクトチェック）に必要な最小限のツールのみを合成エージェントに与えつつ、複雑なケースは既存の調整パターンを維持する。B のバッチ化は合成の各ステップが先に検証した事実に依存する場合ブロッキングを生む、C は関心の分離に反する過剰な権限付与、D は合成エージェントが何を検証したいか予測できない投機的キャッシュ。", "source": "materials/official/exam-guide.pdf (Sample Question 9)"}, {"id": "OFFICIAL-q010", "statement_id": "D3-6", "scenario": "Your pipeline script runs claude \"Analyze this pull request for security issues\" but the job hangs indefinitely. Logs indicate Claude Code is waiting for interactive input.", "scenario_ja": "あなたのパイプラインスクリプトはclaude \"Analyze this pull request for security issues\"を実行するが、ジョブが無期限にハングする。ログはClaude Codeが対話的な入力を待っていることを示している。", "question": "What's the correct approach to run Claude Code in an automated pipeline?", "question_ja": "自動化されたパイプラインでClaude Codeを実行する正しい方法は何か？", "choices": {"A": "Add the -p flag: claude -p \"Analyze this pull request for security issues\"", "B": "Set the environment variable CLAUDE_HEADLESS=true before running the command", "C": "Redirect stdin from /dev/null: claude \"Analyze this pull request for security issues\" < /dev/null", "D": "Add the --batch flag: claude --batch \"Analyze this pull request for security issues\""}, "choices_ja": {"A": "-pフラグを追加する：claude -p \"Analyze this pull request for security issues\"", "B": "コマンドを実行する前に環境変数CLAUDE_HEADLESS=trueを設定する", "C": "標準入力を/dev/nullからリダイレクトする：claude \"Analyze this pull request for security issues\" < /dev/null", "D": "--batchフラグを追加する：claude --batch \"Analyze this pull request for security issues\""}, "answer": "A", "explanation_ja": "-p（または--print）フラグはClaude Codeを非対話モードで実行する正規の方法。プロンプトを処理してstdoutに結果を出力し、ユーザー入力を待たずに終了する——CI/CDパイプラインが必要とする挙動そのもの。他の選択肢は存在しない機能（CLAUDE_HEADLESS環境変数、--batchフラグ）や、Claude Codeのコマンド構文に正しく対処しないUnix的回避策を参照している。", "source": "materials/official/exam-guide.pdf (Sample Question 10)"}, {"id": "OFFICIAL-q011", "statement_id": "D4-5", "scenario": "Your team wants to reduce API costs for automated analysis. Currently, real-time Claude calls power two workflows: (1) a blocking pre-merge check that must complete before developers can merge, and (2) a technical debt report generated overnight for review the next morning. Your manager proposes switching both to the Message Batches API for its 50% cost savings.", "scenario_ja": "あなたのチームは自動分析のAPIコストを削減したいと考えている。現在、リアルタイムのClaude呼び出しが2つのワークフローを動かしている：(1) 開発者がマージする前に完了しなければならないブロッキング型のpre-mergeチェック、(2) 翌朝レビューするための夜間生成される技術的負債レポート。あなたのマネージャーは、50%のコスト削減のため両方をMessage Batches APIに切り替えることを提案している。", "question": "How should you evaluate this proposal?", "question_ja": "この提案をどう評価すべきか？", "choices": {"A": "Use batch processing for the technical debt reports only; keep real-time calls for pre-merge checks.", "B": "Switch both workflows to batch processing with status polling to check for completion.", "C": "Keep real-time calls for both workflows to avoid batch result ordering issues.", "D": "Switch both to batch processing with a timeout fallback to real-time if batches take too long."}, "choices_ja": {"A": "技術的負債レポートのみバッチ処理を使い、pre-mergeチェックはリアルタイム呼び出しのままにする", "B": "両方のワークフローを、完了確認のためのステータスポーリングを伴うバッチ処理に切り替える", "C": "バッチ結果の順序の問題を避けるため、両方ともリアルタイム呼び出しのままにする", "D": "バッチが時間がかかりすぎる場合にリアルタイムへフォールバックするタイムアウトを伴い、両方をバッチ処理に切り替える"}, "answer": "A", "explanation_ja": "Message Batches APIは50%のコスト削減を提供するが、処理時間は最大24時間でレイテンシSLAの保証がない。これは開発者が結果を待つブロッキングなpre-mergeチェックには不向きだが、夜間の技術的負債レポートのようなジョブには最適。B は『しばしば速い』ことに依存しブロッキングワークフローには受け入れがたい。C は誤解（バッチ結果はcustom_idで相関できる）に基づく。D はシンプルな解（各APIを適切な用途に合わせる）で足りるのに不要な複雑さを加えている。", "source": "materials/official/exam-guide.pdf (Sample Question 11)"}, {"id": "OFFICIAL-q012", "statement_id": "D4-6", "scenario": "A pull request modifies 14 files across the stock tracking module. Your single-pass review analyzing all files together produces inconsistent results: detailed feedback for some files but superficial comments for others, obvious bugs missed, and contradictory feedback—flagging a pattern as problematic in one file while approving identical code elsewhere in the same PR.", "scenario_ja": "あるプルリクエストが在庫追跡モジュール内の14個のファイルを変更している。すべてのファイルを一緒に分析する単一パスのレビューは、一貫性のない結果を生んでいる：一部のファイルには詳細なフィードバックがある一方で他は表面的なコメントにとどまり、明白なバグが見落とされ、矛盾したフィードバックも生じている——同じPR内の同一のコードを、あるファイルでは問題ありとフラグしながら別の場所では承認している。", "question": "How should you restructure the review?", "question_ja": "レビューをどう再構成すべきか？", "choices": {"A": "Split into focused passes: analyze each file individually for local issues, then run a separate integration-focused pass examining cross-file data flow.", "B": "Require developers to split large PRs into smaller submissions of 3-4 files before the automated review runs.", "C": "Switch to a higher-tier model with a larger context window to give all 14 files adequate attention in one pass.", "D": "Run three independent review passes on the full PR and only flag issues that appear in at least two of the three runs."}, "choices_ja": {"A": "焦点を絞ったパスに分割する：各ファイルを個別にローカルな問題について分析し、その後ファイル横断のデータフローを調べる別の統合フォーカスのパスを実行する", "B": "自動レビューが実行される前に、開発者に大きなPRを3〜4ファイルずつの小さな提出に分割することを求める", "C": "14個のファイルすべてに1回のパスで十分な注意を払えるよう、より大きなコンテキストウィンドウを持つ上位モデルに切り替える", "D": "PR全体に対して3回の独立したレビューパスを実行し、3回のうち少なくとも2回で現れた問題のみをフラグする"}, "answer": "A", "explanation_ja": "フォーカスを絞ったパスへの分割は根本原因（多数のファイルを一度に処理することによる注意の希釈）に直接対処する。ファイル単位の分析は一貫した深さを保証し、別途の統合パスがファイル横断の問題を捕捉する。B は開発者に負担を移すだけでシステム自体は改善しない、C はコンテキストウィンドウの拡大が注意の質の問題を解決しないという誤解、D は断続的にしか検出されない実際のバグをコンセンサス要求によってかえって見逃す可能性がある。", "source": "materials/official/exam-guide.pdf (Sample Question 12)"}];

if (idsParam && QUESTIONS !== QUESTIONS_DEFAULT) {
  const doms = [...new Set(QUESTIONS.map(q => q.id.split("-")[0]))].sort().join("+");
  $("setlabel").textContent = "CCA-F Practice · " + doms + " · " + QUESTIONS.length + "問";
}
function render() {
  const q = QUESTIONS[idx];
  $("counter").textContent = (idx + 1) + " / " + QUESTIONS.length;
  $("pbar").style.width = (idx / QUESTIONS.length * 100) + "%";
  $("domchip").textContent = q.statement_id;
  $("scenario").textContent = q.scenario;
  $("question").textContent = q.question;
  $("feedback").classList.add("hidden");
  const box = $("choices"); box.innerHTML = "";
  for (const key of ["A","B","C","D"]) {
    const b = document.createElement("button");
    b.className = "choice"; b.dataset.key = key;
    const k = document.createElement("span"); k.className = "key"; k.textContent = key;
    const t = document.createElement("span"); t.textContent = q.choices[key];
    b.append(k, t); b.addEventListener("click", () => answer(key));
    box.appendChild(b);
  }
  $("jascenario").textContent = q.scenario_ja || "";
  $("jaquestion").textContent = q.question_ja || "";
  const jac = $("jachoices"); jac.innerHTML = "";
  for (const key of ["A","B","C","D"]) {
    const p = document.createElement("p"); p.className = "jac";
    const b = document.createElement("b"); b.textContent = key + ". ";
    p.append(b, document.createTextNode((q.choices_ja || {})[key] || ""));
    jac.appendChild(p);
  }
  $("jabox").classList.add("hidden");
  $("jabtn").textContent = "日本語訳を表示";
}
$("jabtn").addEventListener("click", () => {
  const shown = $("jabox").classList.toggle("hidden") === false;
  $("jabtn").textContent = shown ? "日本語訳を隠す" : "日本語訳を表示";
});
function answer(key) {
  const q = QUESTIONS[idx];
  const correct = key === q.answer;
  results.push({ id: q.id, correct });
  for (const b of document.querySelectorAll(".choice")) {
    b.disabled = true;
    if (b.dataset.key === q.answer) b.classList.add("correct");
    else if (b.dataset.key === key && !correct) b.classList.add("wrong");
  }
  const v = $("verdict");
  v.textContent = correct ? "✓ Correct" : "✗ Incorrect — correct answer: " + q.answer;
  v.className = "verdict " + (correct ? "ok" : "ng");
  $("expl").textContent = q.explanation_ja;
  const a = $("srclink"); a.href = q.source; a.textContent = q.source;
  $("nextbtn").textContent = idx === QUESTIONS.length - 1 ? "結果を見る →" : "次の問題 →";
  $("feedback").classList.remove("hidden");
  $("feedback").scrollIntoView({ behavior: "smooth", block: "nearest" });
}
$("nextbtn").addEventListener("click", () => {
  idx += 1;
  if (idx < QUESTIONS.length) { render(); window.scrollTo({top:0}); } else { finish(); }
});
function finish() {
  $("quiz").classList.add("hidden");
  $("pbar").style.width = "100%";
  const ok = results.filter(r => r.correct).length;
  $("scoreline").textContent = ok + " / " + results.length;
  const list = $("reslist");
  for (const r of results) {
    const q = QUESTIONS.find(x => x.id === r.id);
    const row = document.createElement("div"); row.className = "row";
    const m = document.createElement("span"); m.className = "mark";
    m.textContent = r.correct ? "✓" : "✗"; m.style.color = r.correct ? "var(--ok)" : "var(--ng)";
    const t = document.createElement("span");
    t.textContent = r.id + " (" + q.statement_id + ") " + q.question.slice(0, 60) + "…";
    row.append(m, t); list.appendChild(row);
  }
  const d = new Date(), pad = (n) => String(n).padStart(2, "0");
  const today = d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
  const code = "QR|" + today + "|quiz-artifact|" + results.map(r => r.id + ":" + (r.correct ? "o" : "x")).join(",");
  $("qrcode").textContent = code;
  if (FORM_BASE && FORM_ENTRY) {
    const sep = FORM_BASE.includes("?") ? "&" : "?";
    $("formbtn").href = FORM_BASE + sep + FORM_ENTRY + "=" + encodeURIComponent(code);
    $("formbtn").classList.remove("hidden");
  }
  $("copybtn").addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(code); $("copybtn").textContent = "コピーしました ✓"; }
    catch { const sel = window.getSelection(), rg = document.createRange();
      rg.selectNodeContents($("qrcode")); sel.removeAllRanges(); sel.addRange(rg);
      $("copybtn").textContent = "選択しました — 長押しでコピー"; }
  });
  $("final").classList.remove("hidden");
}
render();
</script>
</body>
</html>
